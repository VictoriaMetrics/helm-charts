name: "Lint charts"

on:
  push:
    paths:
      - Makefile
      - 'charts/*/lint/**'
      - '.github/workflows/run-lint.yaml'
    branches:
      - master
  pull_request:
    paths:
      - Makefile
      - 'charts/*/lint/**'
      - '.github/workflows/run-lint.yaml'
    branches:
      - master

env:
  HELM_VERSION: 3.15.1

permissions: {}

jobs:
  lint-charts:
    name: Lint Charts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Code checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install helm
        uses: yokawasa/action-setup-kube-tools@9d39563c24d4a419d1a8289c34d6da5a6171252c  # v0.13.5
        with:
          setup-tools: |
            helmv3
          helm: "${{ env.HELM_VERSION }}"

      - name: Install deps
        run: |
          make helm-plugins

      - name: Run lint
        run: |
          make lint

      - name: Run template
        run: |
          make template

      - name: Run unittest
        run: |
          make unittest
