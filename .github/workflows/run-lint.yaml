name: "Lint charts"

on:
  push:
    paths:
      - Makefile
      - 'charts/*/lint/**'
      - '.github/workflows/run-lint.yaml'
    branches:
      - master
  pull_request:
    paths:
      - Makefile
      - 'charts/*/lint/**'
      - '.github/workflows/run-lint.yaml'
    branches:
      - master

env:
  HELM_VERSION: 4.1.1

jobs:
  lint-charts:
    name: Lint Charts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Install helm
        uses: yokawasa/action-setup-kube-tools@v0.13.1
        with:
          setup-tools: |
            helm
          helm: "${{ env.HELM_VERSION }}"

      - name: Install deps
        run: |
          make helm-plugins

      - name: Run lint
        run: |
          make lint

      - name: Run template
        run: |
          make template

      - name: Run unittest
        run: |
          make unittest
