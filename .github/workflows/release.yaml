name: "Release charts"

on:
  workflow_dispatch:
    ref: master
    branches:
      - master
    permissions:
      teams:
        - development

env:
  HELM_VERSION: 4.1.3
  YQ_VERSION: 4.53.3

permissions: {}

jobs:
  release:
    permissions:
      contents: write
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.VM_BOT_GH_TOKEN }}
          persist-credentials: true  # required by the "Automatic update changelogs and readme" step below

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd  # v7.0.0
        with:
          gpg_private_key: ${{ secrets.VM_BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.VM_BOT_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Install tools
        uses: yokawasa/action-setup-kube-tools@b16d49b2c459d33cf9d4c300a220ef0bcdbc730a  # v0.14.0
        with:
          setup-tools: |
            helm
            yq
          helm: "${{ env.HELM_VERSION }}"
          yq: "${{ env.YQ_VERSION }}"

      - name: Add dependencies
        run: |
          yq -M eval '.repositories[] | (.name + " " + .url)' .github/ci/helm-repos.yaml | xargs -L 1 helm repo add
          make helm-repo-update

      - name: Generate docs
        run: make gen-docs

      - name: Generate release notes
        run: |
          # Recursively resolve the victoria-metrics-operator version from a Chart.lock.
          # For direct dependencies the local lock is read; for transitive ones the pinned
          # chart version is pulled from its OCI repository so the correct lock is used.
          find_operator_version() {
            local LOCK_FILE="$1"
            local DEPTH="${2:-0}"
            local NOT_FOUND=1
            [ "$DEPTH" -eq 0 ] || NOT_FOUND=0

            [ -f "$LOCK_FILE" ] || return "$NOT_FOUND"
            [ "$DEPTH" -le 5 ] || return "$NOT_FOUND"

            local VERSION
            VERSION=$(yq -M '.dependencies[] | select(.name == "victoria-metrics-operator") | .version' "$LOCK_FILE")
            if [ -n "$VERSION" ] && [ "$VERSION" != "null" ]; then
              echo "$VERSION"
              return 0
            fi

            while IFS='|' read -r DEP_NAME DEP_REPO DEP_VER; do
              [ -n "$DEP_NAME" ] || continue
              local TMPDIR
              TMPDIR=$(mktemp -d)
              if helm pull "${DEP_REPO}/${DEP_NAME}" --version "$DEP_VER" --untar --untardir "$TMPDIR" 2>/dev/null; then
                VERSION=$(find_operator_version "${TMPDIR}/${DEP_NAME}/Chart.lock" $((DEPTH + 1)))
              fi
              rm -rf "$TMPDIR"
              if [ -n "$VERSION" ]; then
                echo "$VERSION"
                return 0
              fi
            done < <(yq -M '.dependencies[] | select(.name | test("^victoria-")) | [.name, .repository, .version] | join("|")' "$LOCK_FILE")

            return "$NOT_FOUND"
          }

          for CHANGELOG in $(find charts/*/CHANGELOG.md); do
              if grep -q "^## Next release$" $CHANGELOG; then
                echo "Processing $CHANGELOG"
              else
                echo "ERROR: Not found 'Next release' section in $CHANGELOG"
                exit 1
              fi
              
              # Useful variables
              export CHART_DIR="$(dirname $CHANGELOG)"
              export CHART_FILE="${CHART_DIR}/Chart.yaml"
              export APP_VERSION="$(yq -M '.appVersion' $CHART_FILE)"
              export CHART_VERSION="$(yq -M '.version' $CHART_FILE)"
              
              # If version already released
              if grep -q "^## $CHART_VERSION$" $CHANGELOG; then
                echo "There is nothing to release for $CHANGELOG"
              else
                # Release notes file
                BADGES='![Helm: v3](https://img.shields.io/badge/Helm-v3.14%2B-informational?color=informational&logo=helm&link=https%3A%2F%2Fgithub.com%2Fhelm%2Fhelm%2Freleases%2Ftag%2Fv3.14.0)'
                if [ "$APP_VERSION" != "null" ]; then
                  export APP_VERSION_HASH="$(echo $APP_VERSION | tr -d '.')"
                  export APP_LABEL=$(echo $APP_VERSION | sed 's/-/--/g')
                  APP_CHANGELOG_URL="$(yq -M '.annotations["artifacthub.io/links"] | from_yaml | .[] | select(.name == "App Changelog") | .url' $CHART_FILE)"

                  if [ -n "$APP_CHANGELOG_URL" ]; then
                    export APP_CHANGELOG_URL
                    export APP_CHANGELOG=$(yq -n 'env(APP_CHANGELOG_URL) + "#" + env(APP_VERSION_HASH) | @uri')
                    BADGES+=' ![AppVersion: '$APP_VERSION'](https://img.shields.io/badge/'$APP_LABEL'-success?logo=VictoriaMetrics&labelColor=gray&link='$APP_CHANGELOG')'
                  else
                    BADGES+=' ![AppVersion: '$APP_VERSION'](https://img.shields.io/badge/'$APP_LABEL'-success?logo=VictoriaMetrics&labelColor=gray)'
                  fi
                fi

                # Add operator version badge if this chart depends on victoria-metrics-operator (directly or transitively)
                OPERATOR_CHANGELOG_URL="$(yq -M '.annotations["artifacthub.io/links"] | from_yaml | .[] | select(.name == "Operator Changelog") | .url' $CHART_FILE)"
                if [ -n "$OPERATOR_CHANGELOG_URL" ] && [ -f "${CHART_DIR}/Chart.lock" ]; then
                  OPERATOR_VERSION=$(find_operator_version "${CHART_DIR}/Chart.lock")
                  if [ -n "$OPERATOR_VERSION" ]; then
                    export OPERATOR_VERSION
                    export OPERATOR_VERSION_HASH="$(echo $OPERATOR_VERSION | tr -d '.')"
                    export OPERATOR_CHANGELOG_URL
                    OPERATOR_VERSION_LABEL=$(echo $OPERATOR_VERSION | sed 's/-/--/g')
                    OPERATOR_CHANGELOG=$(yq -n 'env(OPERATOR_CHANGELOG_URL) + "#" + env(OPERATOR_VERSION_HASH) | @uri')
                    BADGES+=' ![VM Operator: '$OPERATOR_VERSION'](https://img.shields.io/badge/VM_Operator-'$OPERATOR_VERSION_LABEL'-success?logo=kubernetes&logoColor=7B3FE4&labelColor=white&link='$OPERATOR_CHANGELOG')'
                  fi
                fi

                export BADGES
                export CHANGELOG
                export RELEASE_DATE="**Release date:** $(date '+%d %b %Y')"
                export NOTES="$(sed -n '/## Next release/,/## /p' $CHANGELOG | sed -e '$d' -e '1d')"

                # ArtifactHub annotation in Chart.yaml file
                yq -M -i '.annotations["artifacthub.io/changes"] = (load_str(strenv(CHANGELOG)) | capture("## Next release[\s]*(?P<changes>[\s\S]*?)[\s]*##") | .changes | split("\n") | .[] |= sub("^[\s]*-[\s]+", "") | filter(length > 0) | to_yaml)' $CHART_FILE
                export README=${CHART_DIR}/README.md
                yq -M -i '.annotations["artifacthub.io/readme"] = load_str(strenv(README))' $CHART_FILE

                # Create release notes
                cat <<EOT > ${CHART_DIR}/RELEASE_NOTES
          # Release notes for version $CHART_VERSION

          $RELEASE_DATE

          $BADGES
          $NOTES
          EOT

                # Update chart version in CHANGELOG
                sed -i 's/## Next release/&\n\n- TODO\n\n## $CHART_VERSION\n\n$RELEASE_DATE\n\n$BADGES/' $CHANGELOG
                envsubst < $CHANGELOG > $CHANGELOG.copy
                mv $CHANGELOG.copy $CHANGELOG
              fi
          done

      - name: Release
        if: ${{ hashFiles('charts/*/RELEASE_NOTES') != '' }}
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f  # v1.7.0
        env:
          CR_TOKEN: "${{ secrets.VM_BOT_GH_TOKEN }}"
        with:
          config: .github/ci/cr.yaml

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cosign sign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Release OCI
        if: ${{ hashFiles('charts/*/RELEASE_NOTES') != '' }}
        run: |
          helm registry login \
            -u ${{ github.actor }} \
            -p ${{ github.token }} \
            ghcr.io
          mkdir -p .cr-release-packages
          CHART_REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/helm-charts"
          for chart in charts/*; do
            export CHART_FILE="${chart}/Chart.yaml"
            export CHART_VERSION="$(yq -M '.version' $CHART_FILE)"
            export CHART_NAME=$(basename $chart)
            package=".cr-release-packages/${CHART_NAME}-${CHART_VERSION}.tgz";
            if [ ! -f $chart/RELEASE_NOTES ]; then
              echo "no release notes for chart $chart. removing it from uploading..."
              rm -rf $package
            else
              echo "publishing ${CHART_NAME} ${CHART_VERSION}"
              HELM_OUTPUT=$(helm push $package oci://${CHART_REPO} 2>&1)
              CHART_DIGEST=$(echo "$HELM_OUTPUT" | awk '/^Digest: sha256:[0-9a-f]{64}$/ { print $2 }')
              cosign sign --yes ${CHART_REPO}/${CHART_NAME}@${CHART_DIGEST}
            fi
          done

      - name: Automatic update changelogs and readme
        if: ${{ hashFiles('charts/*/RELEASE_NOTES') != '' }}
        run: |
          rm -rf charts/*/RELEASE_NOTES
          export VM_GIT_BRANCH_NAME="changelog-update-$(date +%s)"
          git checkout -b "${VM_GIT_BRANCH_NAME}"
          git add charts/*/CHANGELOG.md
          git add charts/*/README.md
          git commit -S -m "Automatic update CHANGELOGs and READMEs"
          git push origin ${VM_GIT_BRANCH_NAME}
          gh pr create \
            -H $(git branch --show-current) \
            -t "Automatic update CHANGELOGs and READMEs" \
            -b "Automatic update CHANGELOGs and READMEs"
        env:
          GH_TOKEN: "${{ secrets.VM_BOT_GH_TOKEN }}"
          GITHUB_TOKEN: "${{ secrets.VM_BOT_GH_TOKEN }}"
