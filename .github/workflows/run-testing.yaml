name: "Test charts"

on:
  push:
    paths:
      - Makefile
      - 'charts/**'
      - 'test/**'
      - '!charts/*/lint/**'
      - '!**/*.md.gotmpl'
      - '!**/*.md'
      - '.github/workflows/run-testing.yaml'
    branches:
      - master
  pull_request:
    paths:
      - Makefile
      - 'charts/**'
      - 'test/**'
      - '!charts/*/lint/**'
      - '!**/*.md.gotmpl'
      - '!**/*.md'
      - '.github/workflows/run-testing.yaml'
    branches:
      - master

env:
  HELM_VERSION: 4.2.3

permissions: {}

jobs:
  chart-tests:
    name: Run chart tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    if: github.event.pull_request.draft == false
    strategy:
      matrix:
        k8s_version:
          # renovate: image=kindest/node
          - "v1.36.1"
          - "v1.34.3"
          - "v1.33.7"
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: test/go.mod
          check-latest: true
          cache-dependency-path: test/go.sum
        id: go

      - name: Install gotestsum
        run: |
          go install gotest.tools/gotestsum@latest

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          node_image: kindest/node:${{ matrix.k8s_version }}

      - name: Add helm repo dependencies
        run: yq -M eval '.repositories[] | (.name + " " + .url)' .github/ci/helm-repos.yaml | xargs -L 1 helm repo add

      - name: Run tests
        run: |
          cd test && gotestsum --format standard-verbose --junitfile ../report.xml -- -p 4 -v ./...
        env:
          LICENSE_KEY: ${{ secrets.ENTERPRISE_COMPONENTS_LICENSE_KEY }}

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16  # v6.4.2
        if: success() || failure()
        with:
          report_paths: 'report.xml'
