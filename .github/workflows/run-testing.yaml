name: "Test charts"

on:
  push:
    paths:
      - Makefile
      - 'charts/**'
      - 'test/**'
      - '!charts/*/lint/**'
      - '!**/*.md.gotmpl'
      - '!**/*.md'
      - '.github/workflows/run-testing.yaml'
    branches:
      - master
  pull_request:
    paths:
      - Makefile
      - 'charts/**'
      - 'test/**'
      - '!charts/*/lint/**'
      - '!**/*.md.gotmpl'
      - '!**/*.md'
      - '.github/workflows/run-testing.yaml'
    branches:
      - master

env:
  HELM_VERSION: 3.17.4

permissions: {}

jobs:
  chart-tests:
    name: Run chart tests
    runs-on: ubuntu-slim
    permissions:
      contents: read
      checks: write
    if: github.event.pull_request.draft == false
    strategy:
      matrix:
        k8s_version:
          # renovate: image=kindest/node
          - "v1.36.1"
          - "v1.34.3"
          - "v1.33.7"
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: test/go.mod
          check-latest: true
          cache-dependency-path: test/go.sum
        id: go

      - name: Install gotestsum
        run: |
          go install gotest.tools/gotestsum@latest

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          node_image: kindest/node:${{ matrix.k8s_version }}

      - name: Add helm repo dependencies
        run: yq -M eval '.repositories[] | (.name + " " + .url)' .github/ci/helm-repos.yaml | xargs -L 1 helm repo add

      - name: Run tests
        run: |
          cd test && gotestsum --format standard-verbose --junitfile ../report.xml -- -p 4 ./...
        env:
          LICENSE_KEY: ${{ secrets.ENTERPRISE_COMPONENTS_LICENSE_KEY }}

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d  # v6.4.1
        if: success() || failure()
        with:
          report_paths: 'report.xml'
