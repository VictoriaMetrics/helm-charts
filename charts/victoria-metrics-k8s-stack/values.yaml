global:
  # -- Cluster label to use for dashboards and rules
  clusterLabel: cluster
  # -- Global license configuration
  license:
    key: ""
    keyRef: {}
      # name: secret-license
      # key: license
  cluster:
    # -- K8s cluster domain suffix, uses for building storage pods' FQDN. Details are [here](https://kubernetes.io/docs/tasks/administer-cluster/dns-custom-nameservers/)
    dnsDomain: cluster.local.
  # -- Labels added to all resources
  extraLabels: {}
  # -- Annotations added to all resources
  extraAnnotations: {}

# -- Override chart name
nameOverride: ""
# -- Resource full name override
fullnameOverride: ""
# -- Tenant to use for Grafana datasources and remote write
tenant: "0"
# -- If this chart is used in "Argocd" with "releaseName" field then
# VMServiceScrapes couldn't select the proper services.
# For correct working need set value 'argocdReleaseOverride=$ARGOCD_APP_NAME'
argocdReleaseOverride: ""

# -- VictoriaMetrics Operator dependency chart configuration. More values can be found [here](https://docs.victoriametrics.com/helm/victoria-metrics-operator/#parameters). Also checkout [here](https://docs.victoriametrics.com/operator/configuration/#environment-variables) possible ENV variables to configure operator behaviour
victoria-metrics-operator:
  enabled: true
  crds:
    plain: true
    cleanup:
      enabled: true
      image:
        repository: registry.k8s.io/kubectl
        pullPolicy: IfNotPresent
  serviceMonitor:
    enabled: true
  admissionWebhooks:
    # -- Default the validating webhook `failurePolicy` to `Ignore` so the stack can be installed/upgraded in a single pass without races against the operator's webhook server. Override to `Fail` for strict validation once the operator is in steady state.
    policy: Ignore
  operator:
    # -- By default, operator converts prometheus-operator objects.
    disable_prometheus_converter: false

defaultDashboards:
  # -- Enable dashboard sync via sync-job
  enabled: true
  # -- Additional labels for dashboard resources (ConfigMaps or GrafanaDashboard CRDs)
  labels: {}
  # -- Additional annotations for dashboard resources
  annotations: {}
  grafanaOperator:
    # -- Create GrafanaDashboard CRDs instead of ConfigMaps (requires grafana-operator)
    enabled: false
    spec:
      instanceSelector:
        matchLabels:
          dashboards: grafana
      allowCrossNamespaceImport: false
  # -- Per-dashboard configuration. Keys match dashboard names from JSON content.
  # Set enabled: false to skip a dashboard. Set clusterMetric to patch the cluster variable query.
  dashboards:
    victoriametrics-single-node:
      clusterMetric: vm_app_version
    victoriametrics-vmagent:
      clusterMetric: vm_app_version
    victoriametrics-cluster:
      clusterMetric: vm_app_version
    victoriametrics-vmalert:
      enabled: true
      clusterMetric: vm_app_version
    victoriametrics-operator:
      enabled: true
      clusterMetric: vm_app_version
    victorialogs-cluster:
      clusterMetric: vm_app_version
    victorialogs-single-node:
      clusterMetric: vm_app_version
    victorialogs-vlagent:
      clusterMetric: vm_app_version
    victoriatraces-single-node:
      clusterMetric: vm_app_version
    victoriatraces-cluster:
      clusterMetric: vm_app_version
    node-exporter-full:
      enabled: true
      clusterMetric: node_uname_info
    alertmanager-overview:
      enabled: '{{ .Values.alertmanager.enabled }}'
    grafana-overview:
      enabled: '{{ .Values.grafana.enabled }}'
    controller-manager:
      enabled: '{{ .Values.kubeControllerManager.enabled }}'
    kubelet:
      enabled: '{{ .Values.kubelet.enabled }}'
    proxy:
      enabled: '{{ .Values.kubeProxy.enabled }}'
    scheduler:
      enabled: '{{ .Values.kubeScheduler.enabled }}'
  # -- Dashboard sources. Set enabled: false on any entry to disable it. Add new keys to extend.
  sources:
    victoriatraces-cluster:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaTraces/master/dashboards/victoriatraces-cluster.json
      enabled: '{{ .Values.vtcluster.enabled }}'
    victoriatraces-single-node:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaTraces/master/dashboards/victoriatraces.json
      enabled: '{{ .Values.vtsingle.enabled }}'
    victorialogs-cluster:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaLogs/master/dashboards/victorialogs-cluster.json
      enabled: '{{ .Values.vlcluster.enabled }}'
    victorialogs-single-node:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaLogs/master/dashboards/victorialogs.json
      enabled: '{{ .Values.vlsingle.enabled }}'
    victorialogs-vlagent:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaLogs/master/dashboards/vlagent.json
      enabled: '{{ .Values.vlagent.enabled }}'
    victoriametrics-single-node:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/master/dashboards/victoriametrics.json
      enabled: '{{ .Values.vmsingle.enabled }}'
    victoriametrics-vmagent:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/master/dashboards/vmagent.json
      enabled: '{{ .Values.vmagent.enabled }}'
    victoriametrics-cluster:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/master/dashboards/victoriametrics-cluster.json
      enabled: '{{ .Values.vmcluster.enabled }}'
    victoriametrics-vmalert:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/master/dashboards/vmalert.json
      enabled: '{{ .Values.vmalert.enabled }}'
    victoriametrics-operator:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/master/dashboards/operator.json
      enabled: '{{ index .Values "victoria-metrics-operator" "enabled" }}'
    victoriametrics-backupmanager:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/master/dashboards/backupmanager.json
      enabled: '{{ or (not (empty (dig "spec" "vmBackup" "destination" "" .Values.vmsingle))) (not (empty (dig "spec" "storage" "vmBackup" "destination" "" .Values.vmcluster))) }}'
    kubernetes-views-global:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-global.json
    kubernetes-views-namespaces:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-namespaces.json
    kubernetes-views-pods:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-pods.json
    kubernetes-views-nodes:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-nodes.json
    kubernetes-system-api-server:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-api-server.json
      enabled: '{{ .Values.kubeApiServer.enabled }}'
    kubernetes-system-coredns:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-coredns.json
      enabled: '{{ .Values.coreDns.enabled }}'
    node-exporter-full:
      url: https://raw.githubusercontent.com/rfmoz/grafana-dashboards/master/prometheus/node-exporter-full.json
      enabled: '{{ index .Values "prometheus-node-exporter" "enabled" }}'
    etcd:
      url: https://raw.githubusercontent.com/monitoring-mixins/website/master/assets/etcd/dashboards/etcd.json
      enabled: '{{ .Values.kubeEtcd.enabled }}'
    kube-prometheus:
      url: https://raw.githubusercontent.com/prometheus-operator/kube-prometheus/main/manifests/grafana-dashboardDefinitions.yaml

syncJob:
  # -- Fetch dashboards and rules from upstream sources at deploy time.
  # Creates ConfigMaps (for Grafana sidecar) or GrafanaDashboard CRDs and VMRules directly in the cluster.
  # A new Job runs automatically whenever this config changes.
  enabled: true
  image:
    repository: ghcr.io/victoriametrics/sync-job
    # renovate: image=ghcr.io/victoriametrics/sync-job
    tag: v0.0.8
    pullPolicy: IfNotPresent
  # -- Seconds to keep a finished job before automatic deletion
  ttlSecondsAfterFinished: 600
  # -- Delete managed resources that are no longer in the current config
  prune: true
  # -- Set owner references on managed resources so they are automatically garbage-collected
  # by Kubernetes when the chart is uninstalled, regardless of the deployment tool (Helm, ArgoCD, etc.)
  useOwnerReferences: true
  # -- Prefix for managed resource names (VMRules, ConfigMaps, GrafanaDashboards).
  # Defaults to the Helm release name when empty.
  resourcePrefix: ""
  # -- Override multicluster mode for dashboard and rule patching.
  # Falls back to grafana.sidecar.dashboards.multicluster when not set.
  # multicluster: false
  resources: {}
  nodeSelector: {}
  tolerations: []
  # -- Maximum number of retries before the Job is considered failed
  backoffLimit: 3
  # -- Annotations to add to the sync-job Pod
  podAnnotations: {}
  # -- Security context for the sync-job Pod
  podSecurityContext: {}
  # -- Security context for the sync-job container
  containerSecurityContext: {}
  # -- Affinity for sync-job Pod scheduling
  affinity: {}
  # -- Custom dns config for the sync job Pod.
  dnsConfig: {}
  # -- Alternative DNS policy for the sync job Pod
  dnsPolicy: ""
  # -- Extra env variables for sync job
  env: []

# -- Create default rules for monitoring the cluster
defaultRules:
  # -- Labels, which are used for grouping results of the queries. Note that these labels are joined with `.Values.global.clusterLabel`
  extraGroupByLabels: []
  enabled: true
  # -- Inject namespace=~"<value>" filter into metric selectors for metrics scraped by the given job.
  # Merged with per-group jobNamespaces (per-group wins on conflict).
  # Only use for jobs whose metrics are always namespace-scoped.
  jobNamespaces: {}

  # -- Common properties for VMRule groups
  group:
    spec: {}

  # -- Common properties for all VMRules
  rule:
    spec:
      # -- Additional labels for all VMRules
      labels: {}
      # -- Additional annotations for all VMRules
      annotations: {}

  # -- Common properties for VMRules alerts
  alerting:
    spec:
      # -- Additional labels for VMRule alerts
      labels: {}
      # -- Additional annotations for VMRule alerts
      annotations: {}

  # -- Common properties for VMRules recording rules
  recording:
    spec:
      # -- Additional labels for VMRule recording rules
      labels: {}
      # -- Additional annotations for VMRule recording rules
      annotations: {}

  # -- Per rule properties
  rules: {}
    # CPUThrottlingHigh:
    #   enabled: false
    #   spec:
    #     for: 15m
    #     labels:
    #       severity: critical
  # -- Rule group properties. Keys must match upstream group names exactly.
  groups:
    etcd:
      # -- Enable/disable rule group
      enabled: true
      # -- Per-group override for extraGroupByLabels. When set, replaces the global extraGroupByLabels for this group only.
      # extraGroupByLabels: []
      # -- Common properties for all rules in a group
      rules: {}
      # spec:
      #   annotations:
      #     dashboard: https://example.com/dashboard/1
      # -- Common properties for all recording rules in a group
      recording: {}
      # spec:
      #   annotations:
      #     dashboard: https://example.com/dashboard/1
      # -- Common properties for all alerting rules in a group
      alerting: {}
      # spec:
      #   annotations:
      #     dashboard: https://example.com/dashboard/1
    alertmanager.rules:
      rules: {}
    general.rules:
      rules: {}
    k8s.rules.container_cpu_limits:
      rules: {}
    k8s.rules.container_cpu_requests:
      rules: {}
    k8s.rules.container_cpu_usage_seconds_total:
      rules: {}
    k8s.rules.container_memory_limits:
      rules: {}
    k8s.rules.container_memory_requests:
      rules: {}
    k8s.rules.container_memory_rss:
      rules: {}
    k8s.rules.container_memory_cache:
      rules: {}
    k8s.rules.container_memory_working_set_bytes:
      rules: {}
    k8s.rules.container_memory_swap:
      rules: {}
    k8s.rules.pod_owner:
      rules: {}
    kube-apiserver-burnrate.rules:
      rules: {}
    kube-apiserver-histogram.rules:
      rules: {}
    kube-apiserver-slos:
      rules: {}
    kube-prometheus-general.rules:
      rules: {}
    kube-prometheus-node-recording.rules:
      rules: {}
    kube-scheduler.rules:
      rules: {}
    kube-state-metrics:
      rules: {}
    kubelet.rules:
      rules: {}
    kubernetes-apps:
      rules: {}
      jobNamespaces:
        kube-state-metrics: ".*"
    kubernetes-resources:
      rules: {}
    kubernetes-storage:
      rules: {}
      jobNamespaces:
        kubelet: ".*"
    kubernetes-system:
      rules: {}
    kubernetes-system-apiserver:
      rules: {}
    kubernetes-system-controller-manager:
      rules: {}
    kubernetes-system-kubelet:
      rules: {}
    kubernetes-system-scheduler:
      rules: {}
    node-exporter:
      rules: {}
    node-exporter.rules:
      rules: {}
    node-network:
      rules: {}
    node.rules:
      rules: {}
    vm-health:
      rules: {}
    vmagent:
      rules: {}
    vmalert:
      rules: {}
    vmcluster:
      rules: {}
    vmoperator:
      rules: {}
    vmsingle:
      rules: {}

  # -- Runbook url prefix for default rules
  runbookUrl: https://runbooks.prometheus-operator.dev/runbooks

  # -- Labels for default rules
  labels: {}
  # -- Annotations for default rules
  annotations: {}

  # -- Rule sources. Set enabled: false on any entry to disable it. Add new keys to extend.
  sources:
    etcd:
      url: https://raw.githubusercontent.com/monitoring-mixins/website/master/assets/etcd/alerts.yaml
      enabled: '{{ .Values.kubeEtcd.enabled }}'
    alertmanager:
      url: https://raw.githubusercontent.com/prometheus-operator/kube-prometheus/main/manifests/alertmanager-prometheusRule.yaml
      enabled: '{{ .Values.alertmanager.enabled }}'
    kubernetes-control-plane:
      url: https://raw.githubusercontent.com/prometheus-operator/kube-prometheus/main/manifests/kubernetesControlPlane-prometheusRule.yaml
    kubernetes:
      url: https://raw.githubusercontent.com/prometheus-operator/kube-prometheus/main/manifests/kubePrometheus-prometheusRule.yaml
    kube-state-metrics:
      url: https://raw.githubusercontent.com/prometheus-operator/kube-prometheus/main/manifests/kubeStateMetrics-prometheusRule.yaml
      enabled: '{{ index .Values "kube-state-metrics" "enabled" }}'
    node-exporter:
      url: https://raw.githubusercontent.com/prometheus-operator/kube-prometheus/main/manifests/nodeExporter-prometheusRule.yaml
      enabled: '{{ index .Values "prometheus-node-exporter" "enabled" }}'
    vmhealth:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/master/deployment/docker/rules/alerts-health.yml
      enabled: '{{ or .Values.vmsingle.enabled .Values.vmcluster.enabled }}'
    vmagent:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/master/deployment/docker/rules/alerts-vmagent.yml
      enabled: '{{ .Values.vmagent.enabled }}'
    vmalert:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/master/deployment/docker/rules/alerts-vmalert.yml
      enabled: '{{ .Values.vmalert.enabled }}'
    vmsingle:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/master/deployment/docker/rules/alerts-single-node.yml
      enabled: '{{ .Values.vmsingle.enabled }}'
    vmcluster:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/master/deployment/docker/rules/alerts-cluster.yml
      enabled: '{{ .Values.vmcluster.enabled }}'
    vmoperator:
      url: https://raw.githubusercontent.com/VictoriaMetrics/operator/master/config/alerting/vmoperator-rules.yaml
      enabled: '{{ index .Values "victoria-metrics-operator" "enabled" }}'
    vlhealth:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaLogs/master/deployment/docker/rules/alerts-health.yml
      enabled: '{{ or .Values.vlsingle.enabled .Values.vlcluster.enabled .Values.vlagent.enabled }}'
    vlagent:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaLogs/master/deployment/docker/rules/alerts-vlagent.yml
      enabled: '{{ .Values.vlagent.enabled }}'
    victorialogs:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaLogs/master/deployment/docker/rules/alerts-vlogs.yml
      enabled: '{{ or .Values.vlsingle.enabled .Values.vlcluster.enabled }}'
    victoriatraces:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaTraces/master/deployment/docker/rules/alerts-vtraces.yml
      enabled: '{{ or .Values.vtsingle.enabled .Values.vtcluster.enabled }}'
    vthealth:
      url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaTraces/master/deployment/docker/rules/alerts-health.yml
      enabled: '{{ or .Values.vtsingle.enabled .Values.vtcluster.enabled }}'

