
{{- $Values := (.helm).Values | default .Values }}
{{- $multicluster := ((($Values.grafana).sidecar).dashboards).multicluster | default false }}
{{- $defaultDatasource := "prometheus" -}}
{{- range (((($Values.grafana).sidecar).datasources).victoriametrics | default list) }}
  {{- if and .isDefault .type }}{{ $defaultDatasource = .type }}{{- end }}
{{- end }}
templating:
  list:
  - current:
      selected: true
      text: default
      value: default
    hide: 0
    label: Data source
    name: datasource
    query: {{ $defaultDatasource }}
    regex: ""
    type: datasource
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    hide: {{ ternary 0 2 $multicluster }}
    label: cluster
    name: cluster
    query: {{ ternary "label_values(up{job=\"kubelet\",metrics_path=\"/metrics\",cluster=~\"$cluster\"},
      cluster)" ".*" $multicluster }}
    refresh: 2
    sort: 1
    type: {{ ternary "query" "constant" $multicluster }}
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    hide: 0
    includeAll: true
    label: instance
    name: instance
    query: label_values(up{job="kubelet",metrics_path="/metrics",cluster=~"$cluster"},
      instance)
    refresh: 2
    type: query
annotations: {}
condition: {{ ($Values.kubelet).enabled }}
