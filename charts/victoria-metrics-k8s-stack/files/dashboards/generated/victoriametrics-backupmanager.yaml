
{{- $Values := (.helm).Values | default .Values }}
{{- $multicluster := ((($Values.grafana).sidecar).dashboards).multicluster | default false }}
{{- $defaultDatasource := "prometheus" -}}
{{- range (((($Values.grafana).sidecar).datasources).victoriametrics | default list) }}
  {{- if and .isDefault .type }}{{ $defaultDatasource = .type }}{{- end }}
{{- end }}
templating:
  list:
  - current:
      selected: true
      text: VictoriaMetrics
      value: VictoriaMetrics
    hide: 0
    includeAll: false
    multi: false
    name: ds
    query: {{ $defaultDatasource }}
    refresh: 1
    regex: ""
    skipUrlSync: false
    type: datasource
  - allValue: .*
    current:
      text: null
      value: null
    datasource:
      uid: $ds
    hide: 0
    includeAll: true
    multi: true
    name: job
    query:
      query: label_values(vm_app_version{version=~"^vmbackupmanager.*",cluster=~"$cluster"},
        job)
      refId: StandardVariableQuery
    refresh: 1
    regex: ""
    skipUrlSync: false
    sort: 0
    type: query
  - allValue: .*
    current:
      text: null
      value: null
    datasource:
      uid: $ds
    hide: 0
    includeAll: true
    multi: true
    name: instance
    query:
      query: label_values(vm_app_version{job=~"$job",cluster=~"$cluster"}, instance)
      refId: VictoriaMetrics-instance-Variable-Query
    refresh: 1
    regex: ""
    skipUrlSync: false
    sort: 0
    type: query
  - datasource:
      type: prometheus
      uid: $ds
    hide: 0
    name: adhoc
    skipUrlSync: false
    type: adhoc
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    hide: {{ ternary 0 2 $multicluster }}
    includeAll: true
    label: Cluster
    multi: true
    name: cluster
    query: label_values(vm_app_version, cluster)
    type: query
annotations:
