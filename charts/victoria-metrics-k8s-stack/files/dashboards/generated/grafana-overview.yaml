
{{- $Values := (.helm).Values | default .Values }}
{{- $multicluster := ((($Values.grafana).sidecar).dashboards).multicluster | default false }}
{{- $defaultDatasource := "prometheus" -}}
{{- range (((($Values.grafana).sidecar).datasources).victoriametrics | default list) }}
  {{- if and .isDefault .type }}{{ $defaultDatasource = .type }}{{- end }}
{{- end }}
templating:
  list:
  - current:
      selected: true
      text: dev-cortex
      value: dev-cortex
    hide: 0
    includeAll: false
    multi: false
    name: datasource
    query: {{ $defaultDatasource }}
    refresh: 1
    regex: ""
    skipUrlSync: false
    type: datasource
  - allValue: .*
    current:
      selected: false
      text:
      - default/grafana
      value:
      - default/grafana
    datasource:
      uid: $datasource
    hide: 0
    includeAll: true
    multi: true
    name: job
    query:
      query: label_values(grafana_build_info, job)
      refId: Billing Admin-job-Variable-Query
    refresh: 1
    regex: ""
    skipUrlSync: false
    sort: 0
    type: query
  - allValue: .*
    current:
      selected: false
      text: All
      value: $__all
    datasource:
      uid: $datasource
    hide: 0
    includeAll: true
    multi: true
    name: instance
    query:
      query: label_values(grafana_build_info, instance)
      refId: Billing Admin-instance-Variable-Query
    refresh: 1
    regex: ""
    skipUrlSync: false
    sort: 0
    type: query
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    hide: {{ ternary 0 2 $multicluster }}
    includeAll: true
    label: Cluster
    multi: true
    name: cluster
    query: label_values(grafana_build_info, cluster)
    type: query
annotations:
  list:
  - builtIn: 1
    datasource:
      uid: -- Grafana --
    enable: true
    hide: true
    iconColor: rgba(0, 211, 255, 1)
    name: Annotations & Alerts
    target:
      limit: 100
      matchAny: false
      tags: []
      type: dashboard
    type: dashboard
condition: {{ ($Values.grafana).enabled }}
editable: false
graphTooltip: 0
id: 3085
panels:
- datasource:
    uid: $datasource
  fieldConfig:
    defaults:
      noValue: "0"
      thresholds:
        mode: absolute
        steps:
        - color: green
          value: null
        - color: red
          value: 80
    overrides: []
  gridPos:
    h: 5
    w: 6
    x: 0
    "y": 0
  id: 6
  options:
    colorMode: value
    graphMode: area
    justifyMode: auto
    orientation: auto
    percentChangeColorMode: ""
    reduceOptions:
      calcs:
      - mean
      fields: ""
      values: false
    showPercentChange: false
    text: {}
    textMode: auto
    wideLayout: false
  pluginVersion: 8.1.3
  targets:
  - expr: grafana_alerting_result_total{job=~"$job", instance=~"$instance", state="alerting"}
    instant: true
    interval: ""
    legendFormat: ""
    refId: A
  title: Firing Alerts
  type: stat
- datasource:
    uid: $datasource
  fieldConfig:
    defaults:
      thresholds:
        mode: absolute
        steps:
        - color: green
          value: null
        - color: red
          value: 80
    overrides: []
  gridPos:
    h: 5
    w: 6
    x: 6
    "y": 0
  id: 8
  options:
    colorMode: value
    graphMode: area
    justifyMode: auto
    orientation: auto
    percentChangeColorMode: ""
    reduceOptions:
      calcs:
      - mean
      fields: ""
      values: false
    showPercentChange: false
    text: {}
    textMode: auto
    wideLayout: false
  pluginVersion: 8.1.3
  targets:
  - expr: sum(grafana_stat_totals_dashboard{job=~"$job", instance=~"$instance"})
    interval: ""
    legendFormat: ""
    refId: A
  title: Dashboards
  type: stat
- datasource:
    uid: $datasource
  fieldConfig:
    defaults:
      custom:
        align: ""
        displayMode: auto
        inspect: false
      thresholds:
        mode: absolute
        steps:
        - color: green
          value: null
        - color: red
          value: 80
    overrides: []
  gridPos:
    h: 5
    w: 12
    x: 12
    "y": 0
  id: 10
  options:
    frameIndex: 0
    showHeader: true
  pluginVersion: 8.1.3
  targets:
  - expr: grafana_build_info{job=~"$job", instance=~"$instance"}
    instant: true
    interval: ""
    legendFormat: ""
    refId: A
  title: Build Info
  transformations:
  - id: labelsToFields
    options: {}
  - id: organize
    options:
      excludeByName:
        Time: true
        Value: true
        branch: true
        container: true
        goversion: true
        namespace: true
        pod: true
        revision: true
      indexByName:
        Time: 7
        Value: 11
        branch: 4
        container: 8
        edition: 2
        goversion: 6
        instance: 1
        job: 0
        namespace: 9
        pod: 10
        revision: 5
        version: 3
      renameByName: {}
  type: table
- datasource:
    uid: $datasource
  fieldConfig:
    defaults: {}
    overrides: []
  gridPos:
    h: 8
    w: 12
    x: 0
    "y": 5
  id: 2
  options:
    alertThreshold: true
  pluginVersion: 8.1.3
  targets:
  - expr: 'sum by (status_code) (irate(grafana_http_request_duration_seconds_count{job=~"$job",
      instance=~"$instance"}[1m])) '
    interval: ""
    legendFormat: '{{`{{`}}status_code{{`}}`}}'
    refId: A
  title: RPS
  type: graph
- datasource:
    uid: $datasource
  fieldConfig:
    defaults: {}
    overrides: []
  gridPos:
    h: 8
    w: 12
    x: 12
    "y": 5
  id: 4
  options:
    alertThreshold: true
  pluginVersion: 8.1.3
  targets:
  - exemplar: true
    expr: histogram_quantile(0.99, sum(irate(grafana_http_request_duration_seconds_bucket{instance=~"$instance",
      job=~"$job"}[$__rate_interval])) by (le)) * 1
    interval: ""
    legendFormat: 99th Percentile
    refId: A
  - exemplar: true
    expr: histogram_quantile(0.50, sum(irate(grafana_http_request_duration_seconds_bucket{instance=~"$instance",
      job=~"$job"}[$__rate_interval])) by (le)) * 1
    interval: ""
    legendFormat: 50th Percentile
    refId: B
  - exemplar: true
    expr: sum(irate(grafana_http_request_duration_seconds_sum{instance=~"$instance",
      job=~"$job"}[$__rate_interval])) * 1 / sum(irate(grafana_http_request_duration_seconds_count{instance=~"$instance",
      job=~"$job"}[$__rate_interval]))
    interval: ""
    legendFormat: Average
    refId: C
  title: Request Latency
  type: graph
schemaVersion: 30
