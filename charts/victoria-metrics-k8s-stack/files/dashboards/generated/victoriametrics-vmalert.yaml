- datasource:
    type: {{ $defaultDatasource }}
    uid: $datasource
  description: Shows if the last configuration update was successful. "Not Ok" means
    there was an unsuccessful attempt to update the configuration due to some error.
    Check the log for details.
  fieldConfig:
    defaults:
      mappings:
      - options:
          match: "null"
          result:
            color: green
            index: 0
            text: Ok
        type: special
      - options:
          from: 1
          result:
            color: red
            index: 1
            text: Not Ok
          to: 999999
        type: range
      thresholds:
        mode: absolute
        steps:
        - color: green
          value: null
    overrides: []
  gridPos:
    h: 3
    w: 4
    x: 0
    "y": 1
  id: 6
  options:
    colorMode: value
    graphMode: area
    justifyMode: auto
    orientation: auto
    percentChangeColorMode: standard
    reduceOptions:
      calcs:
      - last
      fields: ""
      values: false
    showPercentChange: false
    text: {}
    textMode: auto
    wideLayout: true
  pluginVersion: 12.0.2
  targets:
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    editorMode: code
    exemplar: false
    expr: count(vmalert_config_last_reload_successful{job=~"$job",instance=~"$instance",cluster=~"$cluster"}
      < 1) by(cluster)
    interval: ""
    legendFormat: ""
    range: true
    refId: A
  title: Config update
  type: stat
