
{{- $Values := (.helm).Values | default .Values }}
{{- $multicluster := ((($Values.grafana).sidecar).dashboards).multicluster | default false }}
{{- $defaultDatasource := "prometheus" -}}
{{- range (((($Values.grafana).sidecar).datasources).victoriametrics | default list) }}
  {{- if and .isDefault .type }}{{ $defaultDatasource = .type }}{{- end }}
{{- end }}
templating:
  list:
  - current:
      text: VictoriaMetrics - cluster
      value: PAF93674D0B4E9963
    includeAll: false
    name: ds
    query: {{ $defaultDatasource }}
    refresh: 1
    regex: ""
    type: datasource
  - current:
      text: null
      value: null
    datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    includeAll: true
    multi: true
    name: job
    query:
      query: label_values(vm_app_version{version=~"^vmalert.*",cluster=~"$cluster"},
        job)
      refId: StandardVariableQuery
    refresh: 1
    regex: ""
    type: query
  - allValue: .*
    current:
      text: null
      value: null
    datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    includeAll: true
    multi: true
    name: instance
    query:
      query: label_values(vm_app_version{job=~"$job",cluster=~"$cluster"}, instance)
      refId: StandardVariableQuery
    refresh: 1
    regex: ""
    type: query
  - allValue: .*
    current:
      text: null
      value: null
    datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    includeAll: true
    multi: true
    name: file
    query:
      query: label_values(vmalert_iteration_total{job=~"$job",instance=~"$instance",cluster=~"$cluster"},
        file)
      refId: PrometheusVariableQueryEditor-VariableQuery
    refresh: 1
    regex: ""
    type: query
  - allValue: .*
    current:
      text: null
      value: null
    datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    includeAll: true
    multi: true
    name: group
    query:
      query: label_values(vmalert_iteration_total{job=~"$job",instance=~"$instance",cluster=~"$cluster"},
        group)
      refId: StandardVariableQuery
    refresh: 1
    regex: ""
    type: query
  - current:
      text: "5"
      value: "5"
    includeAll: false
    name: topk
    options:
    - selected: true
      text: "5"
      value: "5"
    - selected: false
      text: "10"
      value: "10"
    - selected: false
      text: "20"
      value: "20"
    - selected: false
      text: "30"
      value: "30"
    - selected: false
      text: "40"
      value: "40"
    - selected: false
      text: "50"
      value: "50"
    query: 5, 10, 20, 30, 40, 50
    type: custom
  - datasource:
      type: prometheus
      uid: ${ds}
    name: filter
    type: adhoc
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    hide: {{ ternary 0 2 $multicluster }}
    includeAll: true
    label: Cluster
    multi: true
    name: cluster
    query: label_values(vm_app_version, cluster)
    type: query
annotations:
  list:
  - builtIn: 1
    datasource:
      type: datasource
      uid: grafana
    enable: true
    hide: true
    iconColor: rgba(0, 211, 255, 1)
    name: Annotations & Alerts
    target:
      limit: 100
      matchAny: false
      tags: []
      type: dashboard
    type: dashboard
  - datasource:
      type: prometheus
      uid: $ds
    enable: true
    expr: sum(vm_app_version{job=~"$job",instance=~"$instance",cluster=~"$cluster"})
      by(short_version,cluster) unless sum(vm_app_version{job=~"$job",instance=~"$instance",cluster=~"$cluster"}
      offset $__interval) by(short_version,cluster)
    hide: true
    iconColor: dark-blue
    name: version
  - datasource:
      type: prometheus
      uid: $ds
    enable: true
    expr: sum(changes(vm_app_start_timestamp{job=~"$job",instance=~"$instance",cluster=~"$cluster"}[$__interval]))
      by(job,instance,cluster)
    hide: false
    iconColor: dark-yellow
    name: restarts
