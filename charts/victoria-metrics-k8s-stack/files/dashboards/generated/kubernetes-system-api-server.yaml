
{{- $Values := (.helm).Values | default .Values }}
{{- $multicluster := ((($Values.grafana).sidecar).dashboards).multicluster | default false }}
{{- $defaultDatasource := "prometheus" -}}
{{- range (((($Values.grafana).sidecar).datasources).victoriametrics | default list) }}
  {{- if and .isDefault .type }}{{ $defaultDatasource = .type }}{{- end }}
{{- end }}
templating:
  list:
  - current:
      selected: false
      text: Prometheus
      value: Prometheus
    hide: 0
    includeAll: false
    label: ""
    multi: false
    name: datasource
    query: {{ $defaultDatasource }}
    refresh: 1
    regex: ""
    skipUrlSync: false
    type: datasource
  - current:
      selected: false
      text: None
      value: ""
    datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    hide: {{ ternary 0 2 $multicluster }}
    includeAll: false
    multi: false
    name: cluster
    query:
      qryType: 1
      query: {{ ternary "label_values(kube_node_info, cluster)" ".*" $multicluster
        }}
      refId: PrometheusVariableQueryEditor-VariableQuery
    refresh: 1
    regex: ""
    skipUrlSync: false
    sort: 1
    type: {{ ternary "query" "constant" $multicluster }}
  - current:
      selected: true
      text: 30s
      value: 30s
    hide: 0
    includeAll: false
    multi: false
    name: resolution
    options:
    - selected: false
      text: 1s
      value: 1s
    - selected: false
      text: 15s
      value: 15s
    - selected: true
      text: 30s
      value: 30s
    - selected: false
      text: 1m
      value: 1m
    - selected: false
      text: 3m
      value: 3m
    - selected: false
      text: 5m
      value: 5m
    query: 1s, 15s, 30s, 1m, 3m, 5m
    skipUrlSync: false
    type: custom
annotations:
  list:
  - builtIn: 1
    datasource:
      type: datasource
      uid: grafana
    enable: true
    hide: true
    iconColor: rgba(0, 211, 255, 1)
    name: Annotations & Alerts
    target:
      limit: 100
      matchAny: false
      tags: []
      type: dashboard
    type: dashboard
  - datasource:
      type: datasource
      uid: grafana
    enable: true
    hide: false
    iconColor: '#5c4ee5'
    name: terraform
    target:
      limit: 100
      matchAny: false
      tags:
      - terraform
      type: tags
  - datasource:
      type: datasource
      uid: grafana
    enable: true
    hide: false
    iconColor: red
    name: oncall
    target:
      limit: 100
      matchAny: false
      tags:
      - oncall
      type: tags
condition: {{ ($Values.kubeApiServer).enabled }}
description: 'This is a modern API Server dashboard for your Kubernetes cluster(s).
  Made for kube-prometheus-stack and take advantage of the latest Grafana features.
  GitHub repository: https://github.com/dotdc/grafana-dashboards-kubernetes'
editable: false
fiscalYearStartMonth: 0
graphTooltip: 1
liveNow: false
panels:
- datasource:
    type: {{ $defaultDatasource }}
    uid: $datasource
  fieldConfig:
    defaults:
      mappings:
      - options:
          "0":
            text: DOWN
          "1":
            text: UP
        type: value
      thresholds:
        mode: absolute
        steps:
        - color: red
          value: null
        - color: green
          value: 1
    overrides: []
  gridPos:
    h: 8
    w: 12
    x: 0
    "y": 0
  id: 42
  options:
    colorMode: background
    graphMode: none
    justifyMode: auto
    orientation: horizontal
    percentChangeColorMode: ""
    reduceOptions:
      calcs:
      - lastNotNull
      fields: ""
      values: false
    showPercentChange: false
    textMode: value_and_name
    wideLayout: false
  pluginVersion: 10.0.1
  targets:
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    exemplar: true
    expr: up{job=~"kubernetes-apiservers|apiserver",cluster=~"$cluster"}
    interval: ""
    legendFormat: '{{`{{`}} instance {{`}}`}}'
    refId: A
  title: API Server - Health Status
  type: stat
- datasource:
    type: {{ $defaultDatasource }}
    uid: $datasource
  fieldConfig:
    defaults:
      custom:
        align: auto
        cellOptions:
          type: auto
        inspect: false
      thresholds:
        mode: absolute
        steps:
        - color: green
          value: null
        - color: red
          value: 80
    overrides:
    - matcher:
        id: byName
        options: __name__
      properties:
      - id: custom.width
        value: 188
  gridPos:
    h: 8
    w: 12
    x: 12
    "y": 0
  id: 60
  options:
    cellHeight: sm
    footer:
      countRows: false
      fields:
      - ""
      reducer:
      - sum
      show: false
    frameIndex: 0
    showHeader: true
    sortBy:
    - desc: false
      displayName: removed_release
  pluginVersion: 10.0.1
  targets:
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    exemplar: true
    expr: apiserver_requested_deprecated_apis{cluster=~"$cluster"}
    interval: ""
    legendFormat: ""
    refId: A
  title: Deprecated Kubernetes Resources
  transformations:
  - id: labelsToFields
    options:
      keepLabels:
      - group
      - job
      - removed_release
      - resource
      - version
      - name
      mode: columns
  - id: merge
    options: {}
  - id: organize
    options:
      excludeByName:
        Time: true
        Value: true
        job: true
      indexByName:
        Time: 6
        Value: 7
        group: 1
        job: 5
        namespace: 0
        removed_release: 4
        resource: 3
        version: 2
      renameByName: {}
  - id: groupBy
    options:
      fields:
        group:
          aggregations:
          - lastNotNull
          operation: groupby
        job:
          aggregations: []
          operation: groupby
        namespace:
          aggregations:
          - lastNotNull
          operation: groupby
        removed_release:
          aggregations: []
          operation: groupby
        resource:
          aggregations:
          - lastNotNull
          operation: groupby
        version:
          aggregations: []
          operation: groupby
  type: table
- datasource:
    type: {{ $defaultDatasource }}
    uid: $datasource
  fieldConfig:
    defaults:
      color:
        mode: palette-classic
      custom:
        axisCenteredZero: false
        axisColorMode: text
        axisLabel: ""
        axisPlacement: auto
        barAlignment: 0
        drawStyle: line
        fillOpacity: 25
        gradientMode: opacity
        hideFrom:
          legend: false
          tooltip: false
          viz: false
        lineInterpolation: smooth
        lineWidth: 2
        pointSize: 5
        scaleDistribution:
          type: linear
        showPoints: never
        spanNulls: false
        stacking:
          group: A
          mode: none
        thresholdsStyle:
          mode: "off"
      thresholds:
        mode: absolute
        steps:
        - color: green
          value: null
        - color: red
          value: 80
      unit: short
    overrides: []
  gridPos:
    h: 8
    w: 12
    x: 0
    "y": 8
  id: 38
  options:
    legend:
      calcs: []
      displayMode: list
      placement: bottom
      showLegend: true
    tooltip:
