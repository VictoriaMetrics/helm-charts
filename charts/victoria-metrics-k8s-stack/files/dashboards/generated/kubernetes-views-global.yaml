
{{- $Values := (.helm).Values | default .Values }}
{{- $multicluster := ((($Values.grafana).sidecar).dashboards).multicluster | default false }}
{{- $defaultDatasource := "prometheus" -}}
{{- range (((($Values.grafana).sidecar).datasources).victoriametrics | default list) }}
  {{- if and .isDefault .type }}{{ $defaultDatasource = .type }}{{- end }}
{{- end }}
templating:
  list:
  - current:
      selected: false
      text: ""
      value: ""
    hide: 0
    includeAll: false
    multi: false
    name: datasource
    query: {{ $defaultDatasource }}
    refresh: 1
    regex: ""
    skipUrlSync: false
    type: datasource
  - current:
      text: null
      value: null
    datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    hide: {{ ternary 0 2 $multicluster }}
    includeAll: false
    multi: false
    name: cluster
    query:
      qryType: 1
      query: {{ ternary "label_values(kube_node_info, cluster)" ".*" $multicluster
        }}
      refId: PrometheusVariableQueryEditor-VariableQuery
    refresh: 1
    regex: ""
    skipUrlSync: false
    sort: 1
    type: {{ ternary "query" "constant" $multicluster }}
  - current:
      selected: false
      text: 30s
      value: 30s
    hide: 0
    includeAll: false
    multi: false
    name: resolution
    options:
    - selected: false
      text: 1s
      value: 1s
    - selected: false
      text: 15s
      value: 15s
    - selected: true
      text: 30s
      value: 30s
    - selected: false
      text: 1m
      value: 1m
    - selected: false
      text: 3m
      value: 3m
    - selected: false
      text: 5m
      value: 5m
    query: 1s, 15s, 30s, 1m, 3m, 5m
    skipUrlSync: false
    type: custom
  - current:
      selected: false
      text: ""
      value: ""
    datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    hide: 0
    includeAll: false
    multi: true
    name: job
    query:
      qryType: 1
      query: label_values(node_cpu_seconds_total{cluster=~"$cluster"}, job)
      refId: PrometheusVariableQueryEditor-VariableQuery
    refresh: 1
    regex: ""
    skipUrlSync: false
    sort: 1
    type: query
annotations:
  list:
  - builtIn: 1
    datasource:
      type: datasource
      uid: grafana
    enable: true
    hide: true
    iconColor: rgba(0, 211, 255, 1)
    name: Annotations & Alerts
    target:
      limit: 100
      matchAny: false
      tags: []
      type: dashboard
    type: dashboard
  - datasource:
      type: datasource
      uid: grafana
    enable: true
    hide: false
    iconColor: '#5c4ee5'
    name: terraform
    target:
      limit: 100
      matchAny: false
      tags:
      - terraform
      type: tags
  - datasource:
      type: datasource
      uid: grafana
    enable: true
    hide: false
    iconColor: red
    name: oncall
    target:
      limit: 100
      matchAny: false
      tags:
      - oncall
      type: tags
condition: {{ ($Values.kubelet).enabled }}
description: 'This is a modern ''Global View'' dashboard for your Kubernetes cluster(s).
  Made for kube-prometheus-stack and take advantage of the latest Grafana features.
  GitHub repository: https://github.com/dotdc/grafana-dashboards-kubernetes'
editable: false
fiscalYearStartMonth: 0
graphTooltip: 1
liveNow: false
panels:
- collapsed: false
  datasource:
    type: prometheus
    uid: ${datasource}
  gridPos:
    h: 1
    w: 24
    x: 0
    "y": 0
  id: 67
  panels: []
  title: Overview
  type: row
- datasource:
    type: {{ $defaultDatasource }}
    uid: $datasource
  fieldConfig:
    defaults:
      color:
        mode: continuous-GrYlRd
      max: 1
      min: 0
      thresholds:
        mode: absolute
        steps:
        - color: green
          value: null
        - color: red
          value: 80
      unit: percentunit
    overrides: []
  gridPos:
    h: 8
    w: 6
    x: 0
    "y": 1
  id: 77
  options:
    displayMode: lcd
    legend:
      calcs: null
      displayMode: ""
      placement: ""
      showLegend: false
    maxVizHeight: 300
    minVizHeight: 10
    minVizWidth: 0
    namePlacement: auto
    orientation: horizontal
    reduceOptions:
      calcs:
      - lastNotNull
      fields: ""
      values: false
    showUnfilled: true
    sizing: auto
    valueMode: color
  pluginVersion: 11.2.0
  targets:
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    editorMode: code
    exemplar: true
    expr: avg(sum(rate(node_cpu_seconds_total{mode!~"idle|iowait|steal",cluster=~"$cluster",job="$job"}[$__rate_interval]))
      by(instance,cpu,cluster)) by(cluster)
    interval: ""
    legendFormat: Real Linux
    range: true
    refId: Real Linux
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    editorMode: code
    exemplar: true
    expr: avg(sum(rate(windows_cpu_time_total{mode!="idle",cluster=~"$cluster"}[$__rate_interval]))
      by(core,cluster)) by(cluster)
    hide: false
    interval: ""
    legendFormat: Real Windows
    range: true
    refId: Real Windows
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    editorMode: code
    expr: sum(kube_pod_container_resource_requests{resource="cpu",cluster=~"$cluster"})
      by(cluster) / sum(machine_cpu_cores{cluster=~"$cluster"}) by(cluster)
    hide: false
    legendFormat: Requests
    range: true
    refId: Requests
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    editorMode: code
    expr: sum(kube_pod_container_resource_limits{resource="cpu",cluster=~"$cluster"})
      by(cluster) / sum(machine_cpu_cores{cluster=~"$cluster"}) by(cluster)
    hide: false
    legendFormat: Limits
    range: true
    refId: Limits
  title: Global CPU  Usage
  transformations:
  - id: calculateField
    options:
      alias: Real
      mode: reduceRow
      reduce:
        include:
        - Real Linux
        - Real Windows
        reducer: mean
  - id: organize
    options:
      excludeByName:
        Real Linux: true
        Real Windows: true
        Time: true
      indexByName:
        Limits: 5
        Real: 1
        Real Linux: 2
        Real Windows: 3
        Requests: 4
        Time: 0
      renameByName: {}
  type: bargauge
- datasource:
    type: {{ $defaultDatasource }}
    uid: $datasource
  fieldConfig:
    defaults:
      color:
        mode: continuous-GrYlRd
      decimals: 2
      max: 1
      min: 0
      thresholds:
        mode: percentage
        steps:
        - color: green
          value: null
        - color: red
          value: 80
      unit: percentunit
    overrides: []
  gridPos:
    h: 8
    w: 6
    x: 6
    "y": 1
  id: 78
  options:
    displayMode: lcd
    legend:
      calcs: null
      displayMode: ""
      placement: ""
      showLegend: false
    maxVizHeight: 300
    minVizHeight: 10
    minVizWidth: 0
    namePlacement: auto
    orientation: horizontal
    reduceOptions:
      calcs:
      - lastNotNull
      fields: ""
      values: false
    showUnfilled: true
    sizing: auto
    text: {}
    valueMode: color
  pluginVersion: 11.2.0
  targets:
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    editorMode: code
    exemplar: true
    expr: sum(node_memory_MemTotal_bytes{cluster=~"$cluster",job="$job"} - node_memory_MemAvailable_bytes{cluster=~"$cluster",job="$job"})
      by(cluster) / sum(node_memory_MemTotal_bytes{cluster=~"$cluster",job="$job"})
      by(cluster)
    hide: false
    interval: ""
    legendFormat: Real Linux
    range: true
    refId: Real Linux
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    editorMode: code
    exemplar: true
    expr: sum(windows_memory_available_bytes{cluster=~"$cluster"} + windows_memory_cache_bytes{cluster=~"$cluster"})
      by(cluster) / sum(windows_os_visible_memory_bytes{cluster=~"$cluster"}) by(cluster)
    interval: ""
    legendFormat: Real Windows
    range: true
    refId: Real Windows
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    editorMode: code
    expr: sum(kube_pod_container_resource_requests{resource="memory",cluster=~"$cluster"})
      by(cluster) / sum(machine_memory_bytes{cluster=~"$cluster"}) by(cluster)
    hide: false
    legendFormat: Requests
    range: true
    refId: Requests
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    editorMode: code
    expr: sum(kube_pod_container_resource_limits{resource="memory",cluster=~"$cluster"})
      by(cluster) / sum(machine_memory_bytes{cluster=~"$cluster"}) by(cluster)
    hide: false
    legendFormat: Limits
    range: true
    refId: Limits
  title: Global RAM Usage
  transformations:
  - id: calculateField
    options:
      alias: Real
      mode: reduceRow
      reduce:
        include:
        - Real Linux
        - Real Windows
        reducer: mean
  - id: organize
    options:
