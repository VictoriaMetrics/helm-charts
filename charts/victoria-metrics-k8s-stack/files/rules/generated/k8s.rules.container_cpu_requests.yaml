
{{- $Values := (.helm).Values | default .Values }}
{{- $runbookUrl := ($Values.defaultRules).runbookUrl | default "https://runbooks.prometheus-operator.dev/runbooks" }}
{{- $additionalGroupByLabels := append $Values.defaultRules.additionalGroupByLabels "cluster" }}
{{- $groupLabels := join "," (uniq $additionalGroupByLabels) }}
{{- $grafanaAddr := include "vm-k8s-stack.grafana.addr" . }}
type: prometheus
name: k8s.rules.container_cpu_requests
rules:
- record: cluster:namespace:pod_cpu:active:kube_pod_container_resource_requests
  expr: kube_pod_container_resource_requests{resource="cpu",job="kube-state-metrics"}
    * on(namespace,pod,cluster) group_left() max(kube_pod_status_phase{phase=~"Pending|Running"}
    == 1) by(namespace,pod,\[\[\ \$groupLabels\ \]\])
  condition: {{ true }}
- record: namespace_cpu:kube_pod_container_resource_requests:sum
  expr: sum(sum(max(kube_pod_container_resource_requests{resource="cpu",job="kube-state-metrics"})
    by(namespace,pod,container,\[\[\ \$groupLabels\ \]\]) * on(namespace,pod,cluster)
    group_left() max(kube_pod_status_phase{phase=~"Pending|Running"} == 1) by(namespace,pod,\[\[\
    \$groupLabels\ \]\])) by(namespace,pod,\[\[\ \$groupLabels\ \]\])) by(namespace,\[\[\
    \$groupLabels\ \]\])
  condition: {{ true }}
condition: {{ true }}
