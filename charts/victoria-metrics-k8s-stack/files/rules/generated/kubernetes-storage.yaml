
{{- $Values := (.helm).Values | default .Values }}
{{- $runbookUrl := ($Values.defaultRules).runbookUrl | default "https://runbooks.prometheus-operator.dev/runbooks" }}
{{- $additionalGroupByLabels := append $Values.defaultRules.additionalGroupByLabels "cluster" }}
{{- $groupLabels := join "," (uniq $additionalGroupByLabels) }}
{{- $grafanaAddr := include "vm-k8s-stack.grafana.addr" . }}
type: prometheus
name: kubernetes-storage
rules:
- alert: KubePersistentVolumeFillingUp
  expr: ((((kubelet_volume_stats_available_bytes{job="kubelet",namespace=~"{{ .targetNamespace
    }}",namespace=~"{{ .targetNamespace }}"} / kubelet_volume_stats_capacity_bytes{job="kubelet",namespace=~"{{
    .targetNamespace }}",namespace=~"{{ .targetNamespace }}"}) < 0.03) and (kubelet_volume_stats_used_bytes{job="kubelet",namespace=~"{{
    .targetNamespace }}",namespace=~"{{ .targetNamespace }}"} > 0)) unless on(cluster,namespace,persistentvolumeclaim)
    (kube_persistentvolumeclaim_access_mode{access_mode="ReadOnlyMany"} == 1)) unless
    on(cluster,namespace,persistentvolumeclaim) (kube_persistentvolumeclaim_labels{label_excluded_from_alerts="true"}
    == 1)
  for: 1m0s
  labels:
    severity: critical
  annotations:
    description: The PersistentVolume claimed by {{`{{`}} $labels.persistentvolumeclaim
      {{`}}`}} in Namespace {{`{{`}} $labels.namespace {{`}}`}} {{`{{`}} with $labels.cluster -{{`}}`}} on Cluster
      {{`{{`}} . {{`}}`}} {{`{{`}}- end {{`}}`}} is only {{`{{`}} $value | humanizePercentage {{`}}`}} free.
    runbook_url: {{ $runbookUrl }}/kubernetes/kubepersistentvolumefillingup'
    summary: PersistentVolume is filling up.
  condition: {{ true }}
- alert: KubePersistentVolumeFillingUp
  expr: (((((kubelet_volume_stats_available_bytes{job="kubelet",namespace=~"{{ .targetNamespace
    }}",namespace=~"{{ .targetNamespace }}"} / kubelet_volume_stats_capacity_bytes{job="kubelet",namespace=~"{{
    .targetNamespace }}",namespace=~"{{ .targetNamespace }}"}) < 0.15) and (kubelet_volume_stats_used_bytes{job="kubelet",namespace=~"{{
    .targetNamespace }}",namespace=~"{{ .targetNamespace }}"} > 0)) and (predict_linear(kubelet_volume_stats_available_bytes{job="kubelet",namespace=~"{{
    .targetNamespace }}",namespace=~"{{ .targetNamespace }}"}[6h], 345600) < 0)) unless
    on(cluster,namespace,persistentvolumeclaim) (kube_persistentvolumeclaim_access_mode{access_mode="ReadOnlyMany"}
    == 1)) unless on(cluster,namespace,persistentvolumeclaim) (kube_persistentvolumeclaim_labels{label_excluded_from_alerts="true"}
    == 1)
  for: 1h0m0s
  labels:
    severity: warning
  annotations:
    description: Based on recent sampling, the PersistentVolume claimed by {{`{{`}} $labels.persistentvolumeclaim
      {{`}}`}} in Namespace {{`{{`}} $labels.namespace {{`}}`}} {{`{{`}} with $labels.cluster -{{`}}`}} on Cluster
      {{`{{`}} . {{`}}`}} {{`{{`}}- end {{`}}`}} is expected to fill up within four days. Currently {{`{{`}} $value
      | humanizePercentage {{`}}`}} is available.
    runbook_url: {{ $runbookUrl }}/kubernetes/kubepersistentvolumefillingup'
    summary: PersistentVolume is filling up.
  condition: {{ true }}
- alert: KubePersistentVolumeInodesFillingUp
  expr: ((((kubelet_volume_stats_inodes_free{job="kubelet",namespace=~"{{ .targetNamespace
    }}",namespace=~"{{ .targetNamespace }}"} / kubelet_volume_stats_inodes{job="kubelet",namespace=~"{{
    .targetNamespace }}",namespace=~"{{ .targetNamespace }}"}) < 0.03) and (kubelet_volume_stats_inodes_used{job="kubelet",namespace=~"{{
    .targetNamespace }}",namespace=~"{{ .targetNamespace }}"} > 0)) unless on(cluster,namespace,persistentvolumeclaim)
    (kube_persistentvolumeclaim_access_mode{access_mode="ReadOnlyMany"} == 1)) unless
    on(cluster,namespace,persistentvolumeclaim) (kube_persistentvolumeclaim_labels{label_excluded_from_alerts="true"}
    == 1)
  for: 1m0s
  labels:
    severity: critical
  annotations:
    description: The PersistentVolume claimed by {{`{{`}} $labels.persistentvolumeclaim
      {{`}}`}} in Namespace {{`{{`}} $labels.namespace {{`}}`}} {{`{{`}} with $labels.cluster -{{`}}`}} on Cluster
      {{`{{`}} . {{`}}`}} {{`{{`}}- end {{`}}`}} only has {{`{{`}} $value | humanizePercentage {{`}}`}} free inodes.
    runbook_url: {{ $runbookUrl }}/kubernetes/kubepersistentvolumeinodesfillingup'
    summary: PersistentVolumeInodes are filling up.
  condition: {{ true }}
- alert: KubePersistentVolumeInodesFillingUp
  expr: (((((kubelet_volume_stats_inodes_free{job="kubelet",namespace=~"{{ .targetNamespace
    }}",namespace=~"{{ .targetNamespace }}"} / kubelet_volume_stats_inodes{job="kubelet",namespace=~"{{
    .targetNamespace }}",namespace=~"{{ .targetNamespace }}"}) < 0.15) and (kubelet_volume_stats_inodes_used{job="kubelet",namespace=~"{{
    .targetNamespace }}",namespace=~"{{ .targetNamespace }}"} > 0)) and (predict_linear(kubelet_volume_stats_inodes_free{job="kubelet",namespace=~"{{
    .targetNamespace }}",namespace=~"{{ .targetNamespace }}"}[6h], 345600) < 0)) unless
    on(cluster,namespace,persistentvolumeclaim) (kube_persistentvolumeclaim_access_mode{access_mode="ReadOnlyMany"}
    == 1)) unless on(cluster,namespace,persistentvolumeclaim) (kube_persistentvolumeclaim_labels{label_excluded_from_alerts="true"}
    == 1)
  for: 1h0m0s
  labels:
    severity: warning
  annotations:
    description: Based on recent sampling, the PersistentVolume claimed by {{`{{`}} $labels.persistentvolumeclaim
      {{`}}`}} in Namespace {{`{{`}} $labels.namespace {{`}}`}} {{`{{`}} with $labels.cluster -{{`}}`}} on Cluster
      {{`{{`}} . {{`}}`}} {{`{{`}}- end {{`}}`}} is expected to run out of inodes within four days. Currently
      {{`{{`}} $value | humanizePercentage {{`}}`}} of its inodes are free.
    runbook_url: {{ $runbookUrl }}/kubernetes/kubepersistentvolumeinodesfillingup'
    summary: PersistentVolumeInodes are filling up.
  condition: {{ true }}
- alert: KubePersistentVolumeErrors
  expr: kube_persistentvolume_status_phase{phase=~"Failed|Pending",job="kube-state-metrics"}
    > 0
  for: 5m0s
  labels:
    severity: critical
  annotations:
    description: The persistent volume {{`{{`}} $labels.persistentvolume {{`}}`}} {{`{{`}} with $labels.cluster
      -{{`}}`}} on Cluster {{`{{`}} . {{`}}`}} {{`{{`}}- end {{`}}`}} has status {{`{{`}} $labels.phase {{`}}`}}.
    runbook_url: {{ $runbookUrl }}/kubernetes/kubepersistentvolumeerrors'
    summary: PersistentVolume is having issues with provisioning.
  condition: {{ true }}
condition: {{ true }}
