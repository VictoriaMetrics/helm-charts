
{{- $Values := (.helm).Values | default .Values }}
{{- $runbookUrl := ($Values.defaultRules).runbookUrl | default "https://runbooks.prometheus-operator.dev/runbooks" }}
{{- $additionalGroupByLabels := append $Values.defaultRules.additionalGroupByLabels "cluster" }}
{{- $groupLabels := join "," (uniq $additionalGroupByLabels) }}
{{- $grafanaAddr := include "vm-k8s-stack.grafana.addr" . }}
type: prometheus
name: node-exporter.rules
rules:
- record: instance:node_num_cpu:sum
  expr: count(node_cpu_seconds_total{job="{{ include \"vm-k8s-stack.nodeExporter.name\"
    . }}",mode="idle"}) without(cpu,mode)
  condition: {{ true }}
- record: instance:node_cpu_utilisation:rate5m
  expr: 1 - avg(sum(rate(node_cpu_seconds_total{job="{{ include \"vm-k8s-stack.nodeExporter.name\"
    . }}",mode=~"idle|iowait|steal"}[5m])) without(mode)) without(cpu)
  condition: {{ true }}
- record: instance:node_load1_per_cpu:ratio
  expr: node_load1{job="{{ include \"vm-k8s-stack.nodeExporter.name\" . }}"} / instance:node_num_cpu:sum{job="{{
    include \"vm-k8s-stack.nodeExporter.name\" . }}"}
  condition: {{ true }}
- record: instance:node_memory_utilisation:ratio
  expr: 1 - ((node_memory_MemAvailable_bytes{job="{{ include \"vm-k8s-stack.nodeExporter.name\"
    . }}"} or (((node_memory_Buffers_bytes{job="{{ include \"vm-k8s-stack.nodeExporter.name\"
    . }}"} + node_memory_Cached_bytes{job="{{ include \"vm-k8s-stack.nodeExporter.name\"
    . }}"}) + node_memory_MemFree_bytes{job="{{ include \"vm-k8s-stack.nodeExporter.name\"
    . }}"}) + node_memory_Slab_bytes{job="{{ include \"vm-k8s-stack.nodeExporter.name\"
    . }}"})) / node_memory_MemTotal_bytes{job="{{ include \"vm-k8s-stack.nodeExporter.name\"
    . }}"})
  condition: {{ true }}
- record: instance:node_vmstat_pgmajfault:rate5m
  expr: rate(node_vmstat_pgmajfault{job="{{ include \"vm-k8s-stack.nodeExporter.name\"
    . }}"}[5m])
  condition: {{ true }}
- record: instance_device:node_disk_io_time_seconds:rate5m
  expr: rate(node_disk_io_time_seconds_total{job="{{ include \"vm-k8s-stack.nodeExporter.name\"
    . }}",device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}[5m])
  condition: {{ true }}
- record: instance_device:node_disk_io_time_weighted_seconds:rate5m
  expr: rate(node_disk_io_time_weighted_seconds_total{job="{{ include \"vm-k8s-stack.nodeExporter.name\"
    . }}",device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}[5m])
  condition: {{ true }}
- record: instance:node_network_receive_bytes_excluding_lo:rate5m
  expr: sum(rate(node_network_receive_bytes_total{job="{{ include \"vm-k8s-stack.nodeExporter.name\"
    . }}",device!="lo"}[5m])) without(device)
  condition: {{ true }}
- record: instance:node_network_transmit_bytes_excluding_lo:rate5m
  expr: sum(rate(node_network_transmit_bytes_total{job="{{ include \"vm-k8s-stack.nodeExporter.name\"
    . }}",device!="lo"}[5m])) without(device)
  condition: {{ true }}
- record: instance:node_network_receive_drop_excluding_lo:rate5m
  expr: sum(rate(node_network_receive_drop_total{job="{{ include \"vm-k8s-stack.nodeExporter.name\"
    . }}",device!="lo"}[5m])) without(device)
  condition: {{ true }}
- record: instance:node_network_transmit_drop_excluding_lo:rate5m
  expr: sum(rate(node_network_transmit_drop_total{job="{{ include \"vm-k8s-stack.nodeExporter.name\"
    . }}",device!="lo"}[5m])) without(device)
  condition: {{ true }}
condition: {{ true }}
