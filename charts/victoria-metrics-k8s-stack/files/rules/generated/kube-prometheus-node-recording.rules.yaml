
{{- $Values := (.helm).Values | default .Values }}
{{- $runbookUrl := ($Values.defaultRules).runbookUrl | default "https://runbooks.prometheus-operator.dev/runbooks" }}
{{- $additionalGroupByLabels := append $Values.defaultRules.additionalGroupByLabels "cluster" }}
{{- $groupLabels := join "," (uniq $additionalGroupByLabels) }}
{{- $grafanaAddr := include "vm-k8s-stack.grafana.addr" . }}
type: prometheus
name: kube-prometheus-node-recording.rules
rules:
- record: instance:node_cpu:rate:sum
  expr: sum(rate(node_cpu_seconds_total{mode!="idle",mode!="iowait",mode!="steal"}[3m]))
    by(instance,\[\[\ \$groupLabels\ \]\])
  condition: {{ true }}
- record: instance:node_network_receive_bytes:rate:sum
  expr: sum(rate(node_network_receive_bytes_total[3m])) by(instance,\[\[\ \$groupLabels\
    \]\])
  condition: {{ true }}
- record: instance:node_network_transmit_bytes:rate:sum
  expr: sum(rate(node_network_transmit_bytes_total[3m])) by(instance,\[\[\ \$groupLabels\
    \]\])
  condition: {{ true }}
- record: instance:node_cpu:ratio
  expr: sum(rate(node_cpu_seconds_total{mode!="idle",mode!="iowait",mode!="steal"}[5m]))
    without(cpu,mode) / on(instance) group_left() count(sum(node_cpu_seconds_total)
    by(instance,cpu,\[\[\ \$groupLabels\ \]\])) by(instance,\[\[\ \$groupLabels\ \]\])
  condition: {{ true }}
- record: cluster:node_cpu:sum_rate5m
  expr: sum(rate(node_cpu_seconds_total{mode!="idle",mode!="iowait",mode!="steal"}[5m]))
    by(\[\[\ \$groupLabels\ \]\])
  condition: {{ true }}
- record: cluster:node_cpu:ratio
  expr: cluster:node_cpu:sum_rate5m / count(sum(node_cpu_seconds_total) by(instance,cpu,\[\[\
    \$groupLabels\ \]\])) by(\[\[\ \$groupLabels\ \]\])
  condition: {{ true }}
condition: {{ true }}
