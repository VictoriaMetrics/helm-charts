
{{- $Values := (.helm).Values | default .Values }}
{{- $runbookUrl := ($Values.defaultRules).runbookUrl | default "https://runbooks.prometheus-operator.dev/runbooks" }}
{{- $additionalGroupByLabels := append $Values.defaultRules.additionalGroupByLabels "cluster" }}
{{- $groupLabels := join "," (uniq $additionalGroupByLabels) }}
{{- $grafanaAddr := include "vm-k8s-stack.grafana.addr" . }}
type: prometheus
name: kubernetes-system-apiserver
rules:
- alert: KubeClientCertificateExpiration
  expr: (histogram_quantile(0.01, sum(rate(apiserver_client_certificate_expiration_seconds_bucket{job="apiserver"}[5m]))
    without(namespace,service,endpoint)) < 604800) and on(job,cluster,instance) (apiserver_client_certificate_expiration_seconds_count{job="apiserver"}
    > 0)
  for: 5m0s
  labels:
    severity: warning
  annotations:
    description: A client certificate used to authenticate to kubernetes apiserver
      is expiring in less than 7.0 days on cluster {{`{{`}} $labels.cluster {{`}}`}}.
    runbook_url: {{ $runbookUrl }}/kubernetes/kubeclientcertificateexpiration'
    summary: Client certificate is about to expire.
  condition: {{ true }}
- alert: KubeClientCertificateExpiration
  expr: (histogram_quantile(0.01, sum(rate(apiserver_client_certificate_expiration_seconds_bucket{job="apiserver"}[5m]))
    without(namespace,service,endpoint)) < 86400) and on(job,cluster,instance) (apiserver_client_certificate_expiration_seconds_count{job="apiserver"}
    > 0)
  for: 5m0s
  labels:
    severity: critical
  annotations:
    description: A client certificate used to authenticate to kubernetes apiserver
      is expiring in less than 24.0 hours on cluster {{`{{`}} $labels.cluster {{`}}`}}.
    runbook_url: {{ $runbookUrl }}/kubernetes/kubeclientcertificateexpiration'
    summary: Client certificate is about to expire.
  condition: {{ true }}
- alert: KubeAggregatedAPIErrors
  expr: sum(increase(aggregator_unavailable_apiservice_total{job="apiserver"}[1m]))
    by(\[\[\ \$groupLabels\ \]\],instance,name,reason) > 0
  for: 10m0s
  labels:
    severity: warning
  annotations:
    description: Kubernetes aggregated API {{`{{`}} $labels.instance {{`}}`}}/{{`{{`}} $labels.name
      {{`}}`}} has reported {{`{{`}} $labels.reason {{`}}`}} errors on cluster {{`{{`}} $labels.cluster {{`}}`}}.
    runbook_url: {{ $runbookUrl }}/kubernetes/kubeaggregatedapierrors'
    summary: Kubernetes aggregated API has reported errors.
  condition: {{ true }}
- alert: KubeAggregatedAPIDown
  expr: ((1 - max(avg_over_time(aggregator_unavailable_apiservice{job="apiserver"}[10m]))
    by(name,namespace,\[\[\ \$groupLabels\ \]\])) * 100) < 85
  for: 5m0s
  labels:
    severity: warning
  annotations:
    description: Kubernetes aggregated API {{`{{`}} $labels.name {{`}}`}}/{{`{{`}} $labels.namespace
      {{`}}`}} has been only {{`{{`}} $value | humanize {{`}}`}}% available over the last 10m on cluster
      {{`{{`}} $labels.cluster {{`}}`}}.
    runbook_url: {{ $runbookUrl }}/kubernetes/kubeaggregatedapidown'
    summary: Kubernetes aggregated API is down.
  condition: {{ true }}
- alert: KubeAPIDown
  expr: absent(up{job="apiserver"} == 1)
  for: 15m0s
  labels:
    severity: critical
  annotations:
    description: KubeAPI has disappeared from Prometheus target discovery.
    runbook_url: {{ $runbookUrl }}/kubernetes/kubeapidown'
    summary: Target disappeared from Prometheus target discovery.
  condition: {{ ($Values.kubeApiServer).enabled }}
- alert: KubeAPITerminatedRequests
  expr: (sum(rate(apiserver_request_terminations_total{job="apiserver"}[10m])) by(\[\[\
    \$groupLabels\ \]\]) / (sum(rate(apiserver_request_total{job="apiserver"}[10m]))
    by(\[\[\ \$groupLabels\ \]\]) + sum(rate(apiserver_request_terminations_total{job="apiserver"}[10m]))
    by(\[\[\ \$groupLabels\ \]\]))) > 0.20
  for: 5m0s
  labels:
    severity: warning
  annotations:
    description: The kubernetes apiserver has terminated {{`{{`}} $value | humanizePercentage
      {{`}}`}} of its incoming requests on cluster {{`{{`}} $labels.cluster {{`}}`}}.
    runbook_url: {{ $runbookUrl }}/kubernetes/kubeapiterminatedrequests'
    summary: The kubernetes apiserver has terminated {{`{{`}} $value | humanizePercentage
      {{`}}`}} of its incoming requests.
  condition: {{ true }}
condition: {{ true }}
