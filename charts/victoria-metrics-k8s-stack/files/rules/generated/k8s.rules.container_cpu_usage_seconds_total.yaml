
{{- $Values := (.helm).Values | default .Values }}
{{- $runbookUrl := ($Values.defaultRules).runbookUrl | default "https://runbooks.prometheus-operator.dev/runbooks" }}
{{- $additionalGroupByLabels := append $Values.defaultRules.additionalGroupByLabels "cluster" }}
{{- $groupLabels := join "," (uniq $additionalGroupByLabels) }}
{{- $grafanaAddr := include "vm-k8s-stack.grafana.addr" . }}
type: prometheus
name: k8s.rules.container_cpu_usage_seconds_total
rules:
- record: node_namespace_pod_container:container_cpu_usage_seconds_total:sum_rate5m
  expr: sum(rate(container_cpu_usage_seconds_total{job="kubelet",metrics_path="/metrics/cadvisor",image!=""}[5m]))
    by(\[\[\ \$groupLabels\ \]\],namespace,pod,container) * on(cluster,namespace,pod)
    group_left(node) topk(1, max(kube_pod_info{node!=""}) by(\[\[\ \$groupLabels\
    \]\],namespace,pod,node)) by(\[\[\ \$groupLabels\ \]\],namespace,pod)
  condition: {{ true }}
- record: node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate
  expr: sum(irate(container_cpu_usage_seconds_total{job="kubelet",metrics_path="/metrics/cadvisor",image!=""}[5m]))
    by(\[\[\ \$groupLabels\ \]\],namespace,pod,container) * on(cluster,namespace,pod)
    group_left(node) topk(1, max(kube_pod_info{node!=""}) by(\[\[\ \$groupLabels\
    \]\],namespace,pod,node)) by(\[\[\ \$groupLabels\ \]\],namespace,pod)
  condition: {{ true }}
condition: {{ true }}
