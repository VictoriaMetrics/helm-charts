
{{- $Values := (.helm).Values | default .Values }}
{{- $runbookUrl := ($Values.defaultRules).runbookUrl | default "https://runbooks.prometheus-operator.dev/runbooks" }}
{{- $additionalGroupByLabels := append $Values.defaultRules.additionalGroupByLabels "cluster" }}
{{- $groupLabels := join "," (uniq $additionalGroupByLabels) }}
{{- $grafanaAddr := include "vm-k8s-stack.grafana.addr" . }}
type: prometheus
name: vmsingle
interval: 30s
rules:
- alert: DiskRunsOutOfSpaceIn3Days
  expr: ((sum(vm_free_disk_space_bytes) without(path) / (((rate(vm_rows_added_to_storage_total[1d])
    - sum(rate(vm_deduplicated_samples_total[1d])) without(type)) * (sum(vm_data_size_bytes{type!~"indexdb.*"})
    without(type) / sum(vm_rows{type!~"indexdb.*"}) without(type))) + (rate(vm_new_timeseries_created_total[1d])
    * (sum(vm_data_size_bytes{type="indexdb/file"}) by(\[\[\ \$groupLabels\ \]\])
    / sum(vm_rows{type="indexdb/file"}) by(\[\[\ \$groupLabels\ \]\]))))) < 259200)
    > 0
  for: 30m0s
  labels:
    severity: critical
  annotations:
    dashboard: {{ $grafanaAddr }}/d/wNf0q_kZk?viewPanel=53&var-instance={{`{{`}} $labels.instance
      {{`}}`}}'
    description: |-
      Taking into account current ingestion rate, free disk space will be enough only for {{`{{`}} $value | humanizeDuration {{`}}`}} on instance {{`{{`}} $labels.instance {{`}}`}}.
       Consider to limit the ingestion rate, decrease retention or scale the disk space if possible.
    summary: Instance {{`{{`}} $labels.instance {{`}}`}} will run out of disk space soon
  condition: {{ true }}
- alert: NodeBecomesReadonlyIn3Days
  expr: ((sum(vm_free_disk_space_bytes - vm_free_disk_space_limit_bytes) without(path)
    / (((rate(vm_rows_added_to_storage_total[1d]) - sum(rate(vm_deduplicated_samples_total[1d]))
    without(type)) * (sum(vm_data_size_bytes{type!~"indexdb.*"}) without(type) / sum(vm_rows{type!~"indexdb.*"})
    without(type))) + (rate(vm_new_timeseries_created_total[1d]) * (sum(vm_data_size_bytes{type="indexdb/file"})
    by(\[\[\ \$groupLabels\ \]\]) / sum(vm_rows{type="indexdb/file"}) by(\[\[\ \$groupLabels\
    \]\]))))) < 259200) > 0
  for: 30m0s
  labels:
    severity: warning
  annotations:
    dashboard: {{ $grafanaAddr }}/d/oS7Bi_0Wz?viewPanel=53&var-instance={{`{{`}} $labels.instance
      {{`}}`}}'
    description: |-
      Taking into account current ingestion rate and free disk space instance {{`{{`}} $labels.instance {{`}}`}} is writable for {{`{{`}} $value | humanizeDuration {{`}}`}}.
       Consider to limit the ingestion rate, decrease retention or scale the disk space up if possible.
    summary: Instance {{`{{`}} $labels.instance {{`}}`}} will become read-only in 3 days
  condition: {{ true }}
- alert: DiskRunsOutOfSpace
  expr: (sum(vm_data_size_bytes) by(job,instance,\[\[\ \$groupLabels\ \]\]) / (sum(vm_free_disk_space_bytes)
    by(job,instance,\[\[\ \$groupLabels\ \]\]) + sum(vm_data_size_bytes) by(job,instance,\[\[\
    \$groupLabels\ \]\]))) > 0.8
  for: 30m0s
  labels:
    severity: critical
  annotations:
    dashboard: {{ $grafanaAddr }}/d/wNf0q_kZk?viewPanel=53&var-instance={{`{{`}} $labels.instance
      {{`}}`}}'
    description: |-
      Disk utilisation on instance {{`{{`}} $labels.instance {{`}}`}} is more than 80%.
       Having less than 20% of free disk space could cripple merge processes and overall performance. Consider to limit the ingestion rate, decrease retention or scale the disk space if possible.
    summary: Instance {{`{{`}} $labels.instance {{`}}`}} (job={{`{{`}} $labels.job {{`}}`}}) will run out
      of disk space soon
  condition: {{ true }}
- alert: RequestErrorsToAPI
  expr: increase(vm_http_request_errors_total[5m]) > 0
  for: 15m0s
  labels:
    severity: warning
  annotations:
    dashboard: {{ $grafanaAddr }}/d/wNf0q_kZk?viewPanel=35&var-instance={{`{{`}} $labels.instance
      {{`}}`}}'
    description: Requests to path {{`{{`}} $labels.path {{`}}`}} are receiving errors. Please
      verify if clients are sending correct requests.
    summary: Too many errors served for path {{`{{`}} $labels.path {{`}}`}} (instance {{`{{`}} $labels.instance
      {{`}}`}})
  condition: {{ true }}
- alert: TooHighChurnRate
  expr: (sum(rate(vm_new_timeseries_created_total[5m])) by(instance,\[\[\ \$groupLabels\
    \]\]) / sum(rate(vm_rows_inserted_total[5m])) by(instance,\[\[\ \$groupLabels\
    \]\])) > 0.1
  for: 15m0s
  labels:
    severity: warning
  annotations:
    dashboard: {{ $grafanaAddr }}/d/wNf0q_kZk?viewPanel=66&var-instance={{`{{`}} $labels.instance
      {{`}}`}}'
    description: |-
      VM constantly creates new time series on "{{`{{`}} $labels.instance {{`}}`}}".
       This effect is known as Churn Rate.
       High Churn Rate is tightly connected with database performance and may result in unexpected OOM's or slow queries.
    summary: Churn rate is more than 10% on "{{`{{`}} $labels.instance {{`}}`}}" for the last
      15m
  condition: {{ true }}
- alert: TooHighChurnRate24h
  expr: sum(increase(vm_new_timeseries_created_total[24h])) by(instance,\[\[\ \$groupLabels\
    \]\]) > (sum(vm_cache_entries{type="storage/hour_metric_ids"}) by(instance,\[\[\
    \$groupLabels\ \]\]) * 3)
  for: 15m0s
  labels:
    severity: warning
  annotations:
    dashboard: {{ $grafanaAddr }}/d/wNf0q_kZk?viewPanel=66&var-instance={{`{{`}} $labels.instance
      {{`}}`}}'
    description: |-
      The number of created new time series over last 24h is 3x times higher than current number of active series on "{{`{{`}} $labels.instance {{`}}`}}".
       This effect is known as Churn Rate.
       High Churn Rate is tightly connected with database performance and may result in unexpected OOM's or slow queries.
    summary: Too high number of new series on "{{`{{`}} $labels.instance {{`}}`}}" created over
      last 24h
  condition: {{ true }}
- alert: TooHighSlowInsertsRate
  expr: (sum(rate(vm_slow_row_inserts_total[5m])) by(instance,\[\[\ \$groupLabels\
    \]\]) / sum(rate(vm_rows_inserted_total[5m])) by(instance,\[\[\ \$groupLabels\
    \]\])) > 0.05
  for: 15m0s
  labels:
    severity: warning
  annotations:
    dashboard: {{ $grafanaAddr }}/d/wNf0q_kZk?viewPanel=68&var-instance={{`{{`}} $labels.instance
      {{`}}`}}'
    description: High rate of slow inserts on "{{`{{`}} $labels.instance {{`}}`}}" may be a sign
      of resource exhaustion for the current load. It is likely more RAM is needed
      for optimal handling of the current number of active time series. See also https://github.com/VictoriaMetrics/VictoriaMetrics/issues/3976#issuecomment-1476883183
    summary: Percentage of slow inserts is more than 5% on "{{`{{`}} $labels.instance {{`}}`}}"
      for the last 15m
  condition: {{ true }}
concurrency: 2
condition: {{ true }}
