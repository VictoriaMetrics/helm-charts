
{{- $Values := (.helm).Values | default .Values }}
{{- $runbookUrl := ($Values.defaultRules).runbookUrl | default "https://runbooks.prometheus-operator.dev/runbooks" }}
{{- $additionalGroupByLabels := append $Values.defaultRules.additionalGroupByLabels "cluster" }}
{{- $groupLabels := join "," (uniq $additionalGroupByLabels) }}
{{- $grafanaAddr := include "vm-k8s-stack.grafana.addr" . }}
type: prometheus
name: k8s.rules.container_memory_cache
rules:
- record: node_namespace_pod_container:container_memory_cache
  expr: container_memory_cache{job="kubelet",metrics_path="/metrics/cadvisor",image!=""}
    * on(cluster,namespace,pod) group_left(node) topk(1, max(kube_pod_info{node!=""})
    by(\[\[\ \$groupLabels\ \]\],namespace,pod,node)) by(\[\[\ \$groupLabels\ \]\],namespace,pod)
  condition: {{ true }}
condition: {{ true }}
