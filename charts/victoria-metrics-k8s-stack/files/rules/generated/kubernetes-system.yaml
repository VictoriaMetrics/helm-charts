
{{- $Values := (.helm).Values | default .Values }}
{{- $runbookUrl := ($Values.defaultRules).runbookUrl | default "https://runbooks.prometheus-operator.dev/runbooks" }}
{{- $additionalGroupByLabels := append $Values.defaultRules.additionalGroupByLabels "cluster" }}
{{- $groupLabels := join "," (uniq $additionalGroupByLabels) }}
{{- $grafanaAddr := include "vm-k8s-stack.grafana.addr" . }}
type: prometheus
name: kubernetes-system
rules:
- alert: KubeVersionMismatch
  expr: count(count(label_replace(kubernetes_build_info{job!~"kube-dns|coredns"},
    "git_version", "$1", "git_version", "(v[0-9]*.[0-9]*).*")) by(git_version,\[\[\
    \$groupLabels\ \]\])) by(\[\[\ \$groupLabels\ \]\]) > 1
  for: 15m0s
  labels:
    severity: warning
  annotations:
    description: There are {{`{{`}} $value {{`}}`}} different semantic versions of Kubernetes
      components running on cluster {{`{{`}} $labels.cluster {{`}}`}}.
    runbook_url: {{ $runbookUrl }}/kubernetes/kubeversionmismatch'
    summary: Different semantic versions of Kubernetes components running.
  condition: {{ true }}
- alert: KubeClientErrors
  expr: (sum(rate(rest_client_requests_total{job="apiserver",code=~"5.."}[5m])) by(\[\[\
    \$groupLabels\ \]\],instance,job,namespace) / sum(rate(rest_client_requests_total{job="apiserver"}[5m]))
    by(\[\[\ \$groupLabels\ \]\],instance,job,namespace)) > 0.01
  for: 15m0s
  labels:
    severity: warning
  annotations:
    description: Kubernetes API server client '{{`{{`}} $labels.job {{`}}`}}/{{`{{`}} $labels.instance
      {{`}}`}}' is experiencing {{`{{`}} $value | humanizePercentage {{`}}`}} errors on cluster {{`{{`}} $labels.cluster
      {{`}}`}}.
    runbook_url: {{ $runbookUrl }}/kubernetes/kubeclienterrors'
    summary: Kubernetes API server client is experiencing errors.
  condition: {{ true }}
condition: {{ true }}
