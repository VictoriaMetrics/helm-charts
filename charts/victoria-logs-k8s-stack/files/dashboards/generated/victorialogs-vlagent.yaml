
{{- $Values := (.helm).Values | default .Values }}
{{- $multicluster := ((($Values.grafana).sidecar).dashboards).multicluster | default false }}
{{- $defaultDatasource := "prometheus" -}}
{{- $clusterLabel := ($Values.global).clusterLabel | default "cluster" }}
{{- range (($Values.defaultDatasources).victoriametrics).datasources | default list }}
  {{- if and .isDefault .type }}{{ $defaultDatasource = .type }}{{- end }}
{{- end }}
title: VictoriaLogs - vlagent
templating:
  list:
  - name: DS_PROMETHEUS
    label: Datasource
    type: datasource
    query: {{ $defaultDatasource }}
    current:
      selected: true
      text: ""
      value: ${DS_PROMETHEUS}
    options: []
    refresh: 1
    regex: ""
  - name: job
    multi: true
    includeAll: true
    datasource:
      type: {{ $defaultDatasource }}
      uid: $DS_PROMETHEUS
    type: query
    query:
      query: {{ printf "label_values(vm_app_version{version=~\"^vlagent.*\",%s=~\"$cluster\"}, job)" $clusterLabel }}
      refId: VictoriaMetrics-job-Variable-Query
    definition: {{ printf "label_values(vm_app_version{version=~\"^vlagent.*\",%s=~\"$cluster\"}, job)" $clusterLabel }}
    current: {}
    options: []
    refresh: 1
    regex: ""
  - name: instance
    multi: true
    includeAll: true
    datasource:
      type: {{ $defaultDatasource }}
      uid: $DS_PROMETHEUS
    type: query
    query:
      query: {{ printf "label_values(vm_app_version{job=~\"$job\",%s=~\"$cluster\"}, instance)" $clusterLabel }}
      refId: VictoriaMetrics-instance-Variable-Query
    definition: {{ printf "label_values(vm_app_version{job=~\"$job\",%s=~\"$cluster\"}, instance)" $clusterLabel }}
    allValue: .*
    current: {}
    options: []
    refresh: 1
    regex: ""
  - name: url
    multi: true
    includeAll: true
    datasource:
      type: {{ $defaultDatasource }}
      uid: $DS_PROMETHEUS
    type: query
    query:
      query: {{ printf "label_values(vlagent_remotewrite_requests_total{job=~\"$job\",instance=~\"$instance\",%s=~\"$cluster\"}, url)" $clusterLabel }}
      refId: StandardVariableQuery
    definition: {{ printf "label_values(vlagent_remotewrite_requests_total{job=~\"$job\",instance=~\"$instance\",%s=~\"$cluster\"}, url)" $clusterLabel }}
    allValue: .*
    current: {}
    description: The remote write URLs
    options: []
    refresh: 1
    regex: ""
  - name: version
    datasource:
      type: {{ $defaultDatasource }}
      uid: $DS_PROMETHEUS
    type: query
    query:
      query: {{ printf "label_values(vm_app_version{job=~\"$job\",instance=~\"$instance\",%s=~\"$cluster\"}, short_version)" $clusterLabel }}
      refId: StandardVariableQuery
    definition: {{ printf "label_values(vm_app_version{job=~\"$job\",instance=~\"$instance\",%s=~\"$cluster\"}, short_version)" $clusterLabel }}
    hide: 2
    current: {}
    options: []
    refresh: 1
    regex: ""
  - name: adhoc
    datasource:
      type: {{ $defaultDatasource }}
      uid: $DS_PROMETHEUS
    type: adhoc
    baseFilters: []
    filters: []
  - name: cluster
    label: cluster
    multi: {{ ternary true false $multicluster }}
    includeAll: {{ ternary true false $multicluster }}
    datasource:
      type: {{ $defaultDatasource }}
    type: {{ ternary "query" "constant" $multicluster }}
    query: {{ ternary (printf "label_values(vm_app_version, %s)" $clusterLabel) ".*" $multicluster }}
    hide: {{ ternary 0 2 $multicluster }}
    allValue: .*
editable: false
timezone: {{ default "utc" ($Values.defaultDashboards).defaultTimezone }}
tags:
- victoriametrics
- victorialogs
- vm-k8s-stack
annotations:
  list:
  - name: Annotations & Alerts
    datasource:
      type: datasource
      uid: grafana
    builtIn: 1
    enable: true
    hide: true
    iconColor: rgba(0, 211, 255, 1)
    target:
      limit: 100
      matchAny: false
      tags: []
      type: dashboard
    type: dashboard
  - name: version
    expr: {{ printf "sum(vm_app_version{job=~\"$job\",instance=~\"$instance\",%s=~\"$cluster\"}) by(short_version,%s) unless sum(vm_app_version{job=~\"$job\",instance=~\"$instance\",%s=~\"$cluster\"} offset $__interval) by(short_version,%s)" $clusterLabel $clusterLabel $clusterLabel $clusterLabel }}
    datasource:
      type: {{ $defaultDatasource }}
      uid: $DS_PROMETHEUS
    enable: true
    hide: true
    iconColor: dark-blue
    textFormat: '{{`{{`}}short_version{{`}}`}}'
    titleFormat: Version change
  - name: restarts
    expr: {{ printf "sum(changes(vm_app_start_timestamp{job=~\"$job\",instance=~\"$instance\",%s=~\"$cluster\"}[$__interval])) by(job,instance,%s)" $clusterLabel $clusterLabel }}
    datasource:
      type: {{ $defaultDatasource }}
      uid: $DS_PROMETHEUS
    enable: true
    hide: false
    iconColor: dark-yellow
    textFormat: '{{`{{`}}job{{`}}`}}:{{`{{`}}instance{{`}}`}} restarted'
panels:
- title: Stats
  collapsed: false
  gridPos:
    h: 1
    w: 24
    x: 0
    "y": 0
  id: 105
  type: row
- title: Version
  description: See [latest releases](https://docs.victoriametrics.com/victorialogs/changelog/).
  gridPos:
    h: 3
    w: 3
    x: 0
    "y": 1
  id: 162
  options:
    code:
      language: plaintext
      showLineNumbers: false
      showMiniMap: false
    content: '<div style="text-align: center;">$version</div>'
    mode: markdown
  pluginVersion: 12.3.0
  type: text
- title: Log errors (30m)
  targets:
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $DS_PROMETHEUS
    expr: {{ printf "sum(increase(vm_log_messages_total{job=~\"$job\",instance=~\"$instance\",level!=\"info\",%s=~\"$cluster\"}[30m])) by(%s)" $clusterLabel $clusterLabel }}
    interval: ""
    legendFormat: ""
    refId: A
  datasource:
    type: {{ $defaultDatasource }}
    uid: $DS_PROMETHEUS
  description: Shows number of generated  error messages in  logs over last 30m. Non-zero value may be a sign of connectivity or misconfiguration errors.
  fieldConfig:
    defaults:
      mappings: []
      min: 0
      thresholds:
        mode: absolute
        steps:
        - color: green
          value: 0
        - color: red
          value: 1
      unit: short
    overrides: []
  gridPos:
    h: 3
    w: 3
    x: 3
    "y": 1
  id: 16
  links:
  - targetBlank: true
    title: Troubleshooting
    url: https://docs.victoriametrics.com/victorialogs/vlagent/#troubleshooting
  options:
    colorMode: value
    graphMode: area
    justifyMode: auto
    orientation: auto
    percentChangeColorMode: standard
    reduceOptions:
      calcs:
      - last
      fields: ""
      values: false
    showPercentChange: false
    text: {}
    textMode: auto
    wideLayout: true
  pluginVersion: 12.3.0
  type: stat
- title: Persistent queue size
  targets:
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $DS_PROMETHEUS
    expr: {{ printf "sum(vlagent_remotewrite_pending_data_bytes{job=~\"$job\",instance=~\"$instance\",%s=~\"$cluster\"}) by(%s)" $clusterLabel $clusterLabel }}
    interval: ""
    legendFormat: ""
    refId: A
  datasource:
    type: {{ $defaultDatasource }}
    uid: $DS_PROMETHEUS
  description: "Persistent queue size shows size of pending logs in bytes which hasn't been flushed to remote storage yet. \nIncreasing of value might be a sign of connectivity issues. In such cases, vlagent starts to flush pending data on disk with attempt to send it later once connection is restored."
  fieldConfig:
    defaults:
      mappings: []
      min: 0
      thresholds:
        mode: absolute
        steps:
        - color: green
          value: 0
        - color: red
          value: 1.048576e+07
      unit: bytes
    overrides: []
  gridPos:
    h: 3
    w: 3
    x: 9
    "y": 1
  id: 56
  options:
    colorMode: value
    graphMode: area
    justifyMode: auto
    orientation: auto
    percentChangeColorMode: standard
    reduceOptions:
      calcs:
      - last
      fields: ""
      values: false
    showPercentChange: false
    text: {}
    textMode: auto
    wideLayout: true
  pluginVersion: 12.3.0
  type: stat
- title: Ingested bytes
  targets:
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $DS_PROMETHEUS
    expr: {{ printf "sum(rate(vl_bytes_ingested_total{job=~\"$job\",instance=~\"$instance\",%s=~\"$cluster\"}[$__rate_interval])) by(%s)" $clusterLabel $clusterLabel }}
    editorMode: code
    interval: ""
    legendFormat: __auto
    range: true
    refId: A
  datasource:
    type: {{ $defaultDatasource }}
    uid: $DS_PROMETHEUS
  description: "Shows the cumulative number of log entries ingested. \n\nThe size is calculated before compression."
  fieldConfig:
    defaults:
      mappings: []
      min: 0
      thresholds:
        mode: absolute
        steps:
        - color: green
          value: 0
    overrides: []
  gridPos:
    h: 3
    w: 3
    x: 12
    "y": 1
  id: 102
  options:
    colorMode: value
    graphMode: area
    justifyMode: auto
    orientation: auto
    percentChangeColorMode: standard
    reduceOptions:
      calcs:
      - last
      fields: ""
      values: false
    showPercentChange: false
    text: {}
    textMode: auto
    wideLayout: true
  pluginVersion: 12.3.0
  type: stat
- title: Available CPU
  targets:
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $DS_PROMETHEUS
    expr: {{ printf "sum(vm_available_cpu_cores{job=~\"$job\",instance=~\"$instance\",%s=~\"$cluster\"}) by(%s)" $clusterLabel $clusterLabel }}
    editorMode: code
    exemplar: true
    format: time_series
    instant: true
    interval: ""
    intervalFactor: 1
    legendFormat: ""
    refId: A
  datasource:
    type: {{ $defaultDatasource }}
    uid: $DS_PROMETHEUS
  description: 'Total number of available CPUs for selected vlagents. '
  fieldConfig:
    defaults:
      color:
        mode: thresholds
      mappings: []
      thresholds:
        mode: absolute
        steps:
        - color: green
          value: 0
      unit: short
    overrides: []
  gridPos:
    h: 3
    w: 3
    x: 15
    "y": 1
  id: 152
  maxDataPoints: 100
  options:
    colorMode: value
    graphMode: area
    justifyMode: auto
    orientation: horizontal
    percentChangeColorMode: standard
    reduceOptions:
      calcs:
      - lastNotNull
      fields: ""
      values: false
    showPercentChange: false
    text: {}
    textMode: auto
    wideLayout: true
  pluginVersion: 12.3.0
  type: stat
- title: Uptime
  targets:
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $DS_PROMETHEUS
    expr: {{ printf "sort((time() - vm_app_start_timestamp{job=~\"$job\",instance=~\"$instance\",%s=~\"$cluster\"}) or up{job=~\"$job\",instance=~\"$instance\",%s=~\"$cluster\"})" $clusterLabel $clusterLabel }}
    format: table
    hide: false
    instant: true
    interval: ""
    legendFormat: '{{`{{`}}instance{{`}}`}}'
    refId: A
  datasource:
    uid: $DS_PROMETHEUS
  fieldConfig:
    defaults:
      custom:
        align: auto
        cellOptions:
          type: auto
        footer:
          reducers: []
        inspect: false
      decimals: 2
      displayName: ""
      mappings: []
      thresholds:
        mode: absolute
        steps:
        - color: green
          value: 0
        - color: red
          value: 80
      unit: short
    overrides:
    - matcher:
        id: byName
        options: Value
      properties:
      - id: displayName
        value: uptime
      - id: unit
        value: s
      - id: decimals
        value: 2
      - id: custom.cellOptions
        value:
          type: color-background
      - id: custom.align
      - id: thresholds
        value:
          mode: absolute
          steps:
          - color: rgba(245, 54, 54, 0.9)
            value: 0
          - color: rgba(237, 129, 40, 0.89)
            value: 1800
          - color: rgba(50, 172, 45, 0.97)
            value: 3600
    - matcher:
        id: byName
        options: instance
      properties:
      - id: unit
        value: short
      - id: decimals
        value: 2
      - id: custom.align
  gridPos:
    h: 7
    w: 6
    x: 18
    "y": 1
  id: 164
  options:
    cellHeight: sm
    showHeader: true
  pluginVersion: 12.3.0
  transformations:
  - id: merge
    options:
      reducers: []
  type: table
- title: Uptime
  targets:
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $DS_PROMETHEUS
    expr: {{ printf "sort(sum(up{job=~\"$job\",instance=~\"$instance\",%s=~\"$cluster\"}) by(job,instance,%s))" $clusterLabel $clusterLabel }}
    format: time_series
    instant: false
    interval: ""
    legendFormat: '{{`{{`}}instance{{`}}`}}'
    refId: A
  datasource:
    uid: $DS_PROMETHEUS
  fieldConfig:
    defaults:
      color:
        mode: palette-classic
      custom:
        axisBorderShow: false
        axisCenteredZero: false
        axisColorMode: text
        axisLabel: ""
        axisPlacement: auto
        barAlignment: 0
        barWidthFactor: 0.6
        drawStyle: line
        fillOpacity: 10
        gradientMode: none
        hideFrom:
          legend: false
          tooltip: false
          viz: false
        insertNulls: false
        lineInterpolation: stepAfter
        lineWidth: 1
        pointSize: 5
        scaleDistribution:
          type: linear
        showPoints: never
        showValues: false
        spanNulls: false
        stacking:
          group: A
          mode: none
        thresholdsStyle:
          mode: "off"
      decimals: 0
      links: []
      mappings: []
      min: 0
      thresholds:
        mode: absolute
        steps:
        - color: green
          value: 0
        - color: red
          value: 80
      unit: short
    overrides: []
  gridPos:
    h: 4
    w: 15
    x: 0
    "y": 4
  id: 166
  options:
    alertThreshold: true
    legend:
      calcs:
      - lastNotNull
      displayMode: table
      placement: right
      showLegend: true
    tooltip:
      hideZeros: false
      mode: multi
      sort: asc
  pluginVersion: 12.3.0
  type: timeseries
- title: Available memory
  targets:
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $DS_PROMETHEUS
    expr: {{ printf "sum(vm_available_memory_bytes{job=~\"$job\",instance=~\"$instance\",%s=~\"$cluster\"}) by(%s)" $clusterLabel $clusterLabel }}
