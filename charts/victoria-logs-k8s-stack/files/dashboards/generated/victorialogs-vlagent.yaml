        showPoints: never
        showValues: false
        spanNulls: false
        stacking:
          group: A
          mode: none
        thresholdsStyle:
          mode: "off"
      links: []
      mappings: []
      min: 0
      thresholds:
        mode: absolute
        steps:
        - color: green
          value: 0
        - color: red
          value: 80
      unit: short
    overrides:
    - matcher:
        id: byRegexp
        options: /.*(bytes)/
      properties:
      - id: custom.axisPlacement
        value: right
      - id: unit
        value: bytes
  gridPos:
    h: 8
    w: 12
    x: 0
    "y": 9
  id: 2
  options:
    legend:
      calcs:
      - mean
