  id: 153
  maxDataPoints: 100
  options:
    colorMode: value
    graphMode: area
    justifyMode: auto
    orientation: horizontal
    percentChangeColorMode: standard
    reduceOptions:
      calcs:
      - lastNotNull
      fields: ""
      values: false
    showPercentChange: false
    text: {}
    textMode: auto
    wideLayout: true
  pluginVersion: 12.3.0
  type: stat
- title: Overview
  collapsed: false
  gridPos:
    h: 1
    w: 24
    x: 0
    "y": 8
  id: 24
  type: row
- title: 'Logs ingestion rate '
  targets:
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $DS_PROMETHEUS
    expr: {{ printf "sum(rate(vl_rows_ingested_total{job=~\"$job\",instance=~\"$instance\",%s=~\"$cluster\"}[$__rate_interval])) by(type,%s) > 0" $clusterLabel $clusterLabel }}
    editorMode: code
    format: time_series
    hide: false
    intervalFactor: 1
    legendFormat: '{{`{{`}}type{{`}}`}}'
    range: true
    refId: A
  - datasource:
      type: {{ $defaultDatasource }}
      uid: $DS_PROMETHEUS
    expr: {{ printf "sum(rate(vl_bytes_ingested_total{job=~\"$job\",instance=~\"$instance\",%s=~\"$cluster\"}[$__rate_interval])) by(type,%s) > 0" $clusterLabel $clusterLabel }}
    editorMode: code
    hide: false
    instant: false
    legendFormat: '{{`{{`}}type{{`}}`}} (bytes)'
    range: true
    refId: B
  datasource:
    type: {{ $defaultDatasource }}
    uid: $DS_PROMETHEUS
  description: Shows ingestion rate in number of log entries and bytes per second.
  fieldConfig:
    defaults:
      color:
        mode: palette-classic
      custom:
        axisBorderShow: false
        axisCenteredZero: false
        axisColorMode: text
        axisLabel: ""
        axisPlacement: auto
        barAlignment: 0
        barWidthFactor: 0.6
        drawStyle: line
        fillOpacity: 0
        gradientMode: none
        hideFrom:
