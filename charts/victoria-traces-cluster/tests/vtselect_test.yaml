suite: vtselect templates test
chart:
  version: 0.1.1
  appVersion: 0.1.0
templates:
  - vtselect-server.yaml
tests:
  - it: deployment should match snapshot
    asserts:
      - matchSnapshot: {}
  - it: deployment should match snapshot with fullnameOverride, extraLabels and podLabels
    set:
      vtselect:
        name: select
        fullnameOverride: vtselect-node
        extraLabels:
          extraLabelName: extraLabelValue
        podLabels:
          podLabelName: podLabelValue
        resources:
          limits:
            cpu: 100m
            memory: 200Mi
          requests:
            cpu: 100m
            memory: 200Mi
      vtstorage:
        http:
          - name: http
            value: :10492
            primary: true
    asserts:
      - matchSnapshot: {}
  - it: should render custom command
    set:
      vtselect:
        command:
          - /custom/bin/vtselect
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - /custom/bin/vtselect

