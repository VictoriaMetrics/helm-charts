suite: vtstorage templates test
chart:
  version: 0.1.1
  appVersion: 0.1.0
templates:
  - vtstorage-server.yaml
tests:
  - it: statefulset should match snapshot
    asserts:
      - matchSnapshot: {}
  - it: statefulset should match snapshot with fullnameOverride, extraLabels and podLabels
    set:
      vtstorage:
        name: storage
        fullnameOverride: vtstorage-node
        extraLabels:
          extraLabelName: extraLabelValue
        podLabels:
          podLabelName: podLabelValue
        retentionDiskSpaceUsage: 100
        http:
          - name: http
            value: :10492
            primary: true
    asserts:
      - matchSnapshot: {}
  - it: should render custom command
    set:
      vtstorage:
        command:
          - /custom/bin/vtstorage
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - /custom/bin/vtstorage
