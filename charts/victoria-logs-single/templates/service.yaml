{{- $app := .Values.server }}
{{- $mode := $app.mode }}
{{- $service := $app.service }}
{{- if $app.enabled -}}
{{- $ctx := dict "helm" . "appKey" "server" }}
{{- $fullname := include "vm.plain.fullname" $ctx }}
{{- $ns := include "vm.namespace" $ctx }}
---
apiVersion: v1
kind: Service
metadata:
  {{- with $service.annotations }}
  annotations: {{ toYaml . | nindent 4 }}
  {{- end }}
  {{- $_ := set $ctx "extraLabels" $app.service.labels }}
  labels: {{ include "vm.labels" $ctx | nindent 4 }}
  {{- $_ := unset $ctx "extraLabels" }}
  name: {{ $fullname }}
  namespace: {{ $ns }}
spec:
  {{- with $service.trafficDistribution }}
  trafficDistribution: {{ . }}
  {{- end }}
  {{- $type := $service.type }}
  {{- if and (not $type) (eq $mode "statefulSet") }}
    {{- $type = "ClusterIP" }}
  {{- end }}
  type: {{ $type }}
  {{- $clusterIP := $service.clusterIP }}
  {{- if eq $type "ClusterIP" }}
  {{- with $service.clusterIP }}
  clusterIP: {{ . }}
  {{- end }}
  {{- end }}
  {{- with $service.externalIPs }}
  externalIPs: {{ toYaml . | nindent 4 }}
  {{- end }}
  {{- with $service.loadBalancerIP }}
  loadBalancerIP: {{ . }}
  {{- end }}
  {{- with $service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges: {{ toYaml . | nindent 4 }}
  {{- end }}
  {{- with $service.healthCheckNodePort }}
  healthCheckNodePort: {{ . }}
  {{- end }}
  {{- with $service.externalTrafficPolicy }}
  externalTrafficPolicy: {{ . }}
  {{- end }}
  {{- with $service.ipFamilyPolicy }}
  ipFamilyPolicy: {{ . }}
  {{- end }}
  {{- with $service.ipFamilies }}
  ipFamilies: {{ toYaml . | nindent 4 }}
  {{- end }}
  ports:
    {{- $extraArgs := $app.extraArgs | default dict }}
    {{- $httpAddr := $extraArgs.httpListenAddr -}}
    {{- range ternary $app.http (list (dict "name" "http" "value" $httpAddr "primary" true)) (empty $httpAddr) }}
    - name: {{ .name }}
      {{- $port := include "vm.port.from.flag" (dict "flag" .value "default" "9428") }}
      port: {{ ternary ($service.servicePort | default $port) $port (and (.primary | default false) (not (empty $service.servicePort))) }}
      protocol: TCP
      targetPort: {{ .name }}
      {{- if and .primary $service.nodePort }}
      nodePort: {{ $service.nodePort }}
      {{- end }}
    {{- end }}
    {{- $syslogTCPAddr := index $extraArgs "syslog.listenAddr.tcp" -}}
    {{- range ternary $app.syslog.tcp (list (dict "name" "syslog-tcp" "value" $syslogTCPAddr)) (empty $syslogTCPAddr) }}
    - name: {{ .name }}
      port: {{ include "vm.port.from.flag" (dict "flag" .value) }}
      protocol: TCP
      targetPort: {{ .name }}
    {{- end }}
    {{- $syslogUDPAddr := index $extraArgs "syslog.listenAddr.udp" -}}
    {{- range ternary $app.syslog.udp (list (dict "name" "syslog-udp" "value" $syslogUDPAddr)) (empty $syslogUDPAddr) }}
    - name: {{ .name }}
      port: {{ include "vm.port.from.flag" (dict "flag" .value) }}
      protocol: UDP
      targetPort: {{ .name }}
    {{- end }}
    {{- range $service.extraPorts }}
    - name: {{ .name }}
      port: {{ .port }}
      protocol: {{ .protocol | default "TCP" }}
      targetPort: {{ .targetPort }}
    {{- end }}
  selector: {{ include "vm.selectorLabels" $ctx | nindent 4 }}
{{- end }}
