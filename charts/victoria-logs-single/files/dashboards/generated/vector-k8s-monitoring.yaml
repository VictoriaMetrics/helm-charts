
{{- $Values := (.helm).Values | default .Values }}
{{- $multicluster := ((($Values.grafana).sidecar).dashboards).multicluster | default false }}
{{- $defaultDatasource := "prometheus" -}}
{{- range (((($Values.grafana).sidecar).datasources).victoriametrics | default list) }}
  {{- if and .isDefault .type }}{{ $defaultDatasource = .type }}{{- end }}
{{- end }}
templating:
  list:
  - current:
      text: null
      value: null
    includeAll: false
    name: datasource
    query: {{ $defaultDatasource }}
    refresh: 1
    regex: ""
    type: datasource
  - current:
      text: null
      value: null
    hide: {{ ternary 0 2 $multicluster }}
    label: cluster
    name: cluster
    query:
      qryType: 1
      query: {{ ternary "label_values(vector_build_info, cluster)" ".*" $multicluster
        }}
      refId: PrometheusVariableQueryEditor-VariableQuery
    refresh: 1
    regex: ""
    type: {{ ternary "query" "constant" $multicluster }}
  - current:
      text: null
      value: null
    datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    includeAll: true
    label: instance
    multi: true
    name: instance
    query:
      qryType: 1
      query: label_values(vector_build_info, instance)
      refId: PrometheusVariableQueryEditor-VariableQuery
    refresh: 1
    regex: ""
    sort: 1
    type: query
  - current:
      text: null
      value: null
    datasource:
      type: {{ $defaultDatasource }}
      uid: $datasource
    includeAll: true
    multi: true
    name: namespace
    query:
      qryType: 1
      query: label_values(vector_component_received_events_total{component_type="kubernetes_logs",cluster=~"$cluster"},
        pod_namespace)
      refId: PrometheusVariableQueryEditor-VariableQuery
    refresh: 1
    regex: ""
    sort: 1
    type: query
annotations:
  list:
  - builtIn: 1
    datasource:
      type: datasource
      uid: grafana
    enable: true
    hide: true
    iconColor: rgba(0, 211, 255, 1)
    name: Annotations & Alerts
    target:
      limit: 100
      matchAny: false
      tags: []
      type: dashboard
    type: dashboard
