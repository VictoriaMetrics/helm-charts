suite: monitor templates test
chart:
  version: 0.1.1
  appVersion: 0.1.0
templates:
  - monitor.yaml
tests:
  - it: default port uses primary http item name
    set:
      server:
        serviceMonitor:
          enabled: true
        http:
          - name: https
            value: :9428
            primary: true
    asserts:
      - equal:
          path: spec.endpoints[0].port
          value: https

  - it: serviceMonitor.port overrides primary http name
    set:
      server:
        serviceMonitor:
          enabled: true
          port: custom
    asserts:
      - equal:
          path: spec.endpoints[0].port
          value: custom

  - it: targetPort takes priority over port
    set:
      server:
        serviceMonitor:
          enabled: true
          port: custom
          targetPort: 9428
    asserts:
      - equal:
          path: spec.endpoints[0].targetPort
          value: 9428
      - notExists:
          path: spec.endpoints[0].port

  - it: should render tpl in serviceMonitor basicAuth
    set:
      server:
        serviceMonitor:
          enabled: true
          basicAuth:
            username:
              name: "{{ .Release.Name }}-basic-auth"
              key: username
            password:
              name: "{{ .Release.Name }}-basic-auth"
              key: password
    asserts:
      - equal:
          path: spec.endpoints[0].basicAuth
          value:
            username:
              name: RELEASE-NAME-basic-auth
              key: username
            password:
              name: RELEASE-NAME-basic-auth
              key: password

  - it: should render tpl in vmServiceScrape basicAuth
    set:
      server:
        serviceMonitor:
          enabled: false
        vmServiceScrape:
          enabled: true
          basicAuth:
            username:
              name: "{{ .Release.Name }}-basic-auth"
              key: username
            password:
              name: "{{ .Release.Name }}-basic-auth"
              key: password
    asserts:
      - equal:
          path: spec.endpoints[0].basicAuth
          value:
            username:
              name: RELEASE-NAME-basic-auth
              key: username
            password:
              name: RELEASE-NAME-basic-auth
              key: password
