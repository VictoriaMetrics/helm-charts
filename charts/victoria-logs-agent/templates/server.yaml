{{- $ctx := dict "helm" . }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "vm.fullname" $ctx }}
  namespace: {{ include "vm.namespace" $ctx }}
  {{- $_ := set $ctx "extraLabels" .Values.extraLabels }}
  labels: {{ include "vm.labels" $ctx | nindent 4 }}
  {{- $_ := unset $ctx "extraLabels" }}
  {{- $_ := set $ctx "extraAnnotations" .Values.annotations }}
  {{- with (include "vm.annotations" $ctx) }}
  annotations: {{ . | nindent 4 }}
  {{- end }}
  {{- $_ := unset $ctx "extraAnnotations" }}
spec:
  selector:
    matchLabels: {{ include "vm.selectorLabels" $ctx | nindent 6 }}
  serviceName: {{ include "vm.fullname" $ctx }}
  {{- $hpa := .Values.horizontalPodAutoscaling | default .Values.horizontalPodAutoscaler }}
  {{- if not $hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  template:
    metadata:
      {{- $_ := set $ctx "extraLabels" .Values.podLabels }}
      labels: {{ include "vm.podLabels" $ctx | nindent 8 }}
      {{- $_ := unset $ctx "extraLabels" }}
      {{- $_ := set $ctx "extraAnnotations" .Values.podAnnotations }}
      {{- with (include "vm.annotations" $ctx) }}
      annotations: {{ . | nindent 8 }}
      {{- end }}
      {{- $_ := unset $ctx "extraAnnotations" }}
    spec:
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.runtimeClassName }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range $constraint := . }}
        - {{ toYaml $constraint | nindent 10 | trim }}
          {{- if not $constraint.labelSelector }}
          labelSelector:
            matchLabels: {{ include "vm.selectorLabels" $ctx | nindent 14 }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.podSecurityContext.enabled }}
      securityContext: {{ omit .Values.podSecurityContext "enabled" | toYaml | nindent 8 }}
      {{- end }}
      containers:
        - name: vlagent
          image: {{ include "vm.image" $ctx }}
          imagePullPolicy: IfNotPresent
          {{- if .Values.securityContext.enabled }}
          securityContext: {{ omit .Values.securityContext "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.resources }}
          resources: {{ toYaml .Values.resources | nindent 12 }}
          {{- end }}
          args: {{- include "vlagent.args" . | nindent 12 }}
          {{- with .Values.env }}
          env: {{- toYaml . | nindent 12}}
          {{- end }}
          ports:
            {{- $extraArgs := .Values.extraArgs | default dict }}
            {{- $httpAddr := $extraArgs.httpListenAddr -}}
            {{- range ternary .Values.http (list (dict "name" "http" "value" $httpAddr)) (empty $httpAddr) }}
            - name: {{ .name }}
              containerPort: {{ include "vm.port.from.flag" (dict "flag" .value "default" "9429") }}
              protocol: TCP
            {{- end }}
            {{- $syslogTCPAddr := index $extraArgs "syslog.listenAddr.tcp" -}}
            {{- range ternary .Values.syslog.tcp (list (dict "name" "syslog-tcp" "value" $syslogTCPAddr)) (empty $syslogTCPAddr) }}
            - name: {{ .name }}
              containerPort: {{ include "vm.port.from.flag" (dict "flag" .value) }}
              protocol: TCP
            {{- end }}
            {{- $syslogUDPAddr := index $extraArgs "syslog.listenAddr.udp" -}}
            {{- range ternary .Values.syslog.udp (list (dict "name" "syslog-udp" "value" $syslogUDPAddr)) (empty $syslogUDPAddr) }}
            - name: {{ .name }}
              containerPort: {{ include "vm.port.from.flag" (dict "flag" .value) }}
              protocol: UDP
            {{- end }}
          volumeMounts:
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            - name: vl-agent-data
              mountPath: /vlagent-data
            {{- include "vm.license.mount" . | nindent 12 }}
      volumes:
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.persistentVolume.enabled }}
          {{- if .Values.persistentVolume.existingClaim }}
        - name: vl-agent-data
          persistentVolumeClaim:
            claimName: {{ tpl .Values.persistentVolume.existingClaim $ctx }}
          {{- end }}
        {{- else }}
        - name: vl-agent-data
          emptyDir: {}
        {{- end }}
        {{- include "vm.license.volume" . | nindent 8 }}
  {{- $pvc := .Values.persistentVolume }}
  {{- if and $pvc.enabled (not $pvc.existingClaim) }}
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: vl-agent-data
        {{- with $pvc.annotations  }}
        annotations: {{ toYaml . | nindent 10 }}
        {{- end }}
        {{- with $pvc.extraLabels }}
        labels: {{ toYaml . | nindent 10 }}
        {{- end }}
      spec:
        {{- with $pvc.accessModes }}
        accessModes: {{ toYaml . | nindent 10 }}
        {{- end }}
        {{- with $pvc.volumeAttributeClassName }}
        volumeAttributesClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ $pvc.size }}
        {{- with $pvc.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        {{- with $pvc.matchLabels }}
        selector:
          matchLabels: {{ toYaml . | nindent 12 }}
        {{- end }}
  {{- end }}
