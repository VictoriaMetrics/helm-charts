suite: vmauth templates test
chart:
  version: 0.1.1
  appVersion: 0.1.0
templates:
  - vmauth-*.yaml
  - per-az/vmauth-*.yaml
tests:
  - it: vmauth should match snapshot
    set:
      write:
        global:
          vmauth:
            allowUnauthenticated: true
            spec:
              image:
                tag: v1.0.2
      read:
        global:
          vmauth:
            allowUnauthenticated: true
            spec:
              image:
                tag: v1.0.3
              unauthorizedUserAccessSpec:
                url_map:
                  - load_balancing_policy: first_available
                    retry_status_codes: [500, 502, 503]
      zoneTpl:
        read:
          vmauth:
            allowUnauthenticated: true
            spec:
              image:
                tag: v1.0.5
              unauthorizedUserAccessSpec:
                url_map:
                  - load_balancing_policy: first_available
                    retry_status_codes: [500, 502, 503]
        cluster:
          spec:
            image:
              tag: v1.0.7
        vmagent:
          spec:
            image:
              tag: v1.0.8
        
    asserts:
      - matchSnapshot: {}
