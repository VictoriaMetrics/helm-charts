suite: service templates test
chart:
  version: 0.1.1
  appVersion: 0.1.0
templates:
  - service.yaml
tests:
  - it: service should match snapshot
    set:
      vmauth:
        enabled: true
    asserts:
      - matchSnapshot: {}
  - it: service should match snapshot with fullnameOverride and extraLabels
    set:
      vminsert:
        name: insert
        fullnameOverride: vminsert-node
        extraLabels:
          extraLabelName: insertExtraLabelValue
        service:
          labels:
            extraServiceLabelName: insertExtraServiceLabelValue
      vmauth:
        enabled: true
        name: auth
        fullnameOverride: vmauth-node
        extraLabels:
          extraLabelName: authExtraLabelValue
        service:
          labels:
            extraServiceLabelName: authExtraServiceLabelValue
      vmselect:
        name: select
        fullnameOverride: vmselect-node
        extraLabels:
          extraLabelName: selectExtraLabelValue
        service:
          labels:
            extraServiceLabelName: selectExtraServiceLabelValue
      vmstorage:
        name: storage
        fullnameOverride: vmstorage-node
        extraLabels:
          extraLabelName: storageExtraLabelValue
        service:
          labels:
            extraServiceLabelName: storageExtraServiceLabelValue
    asserts:
      - matchSnapshot: {}
  - it: should render nodePort for vmselect service
    set:
      vmselect:
        service:
          type: NodePort
          nodePort: 30481
    asserts:
      - equal:
          path: spec.type
          value: NodePort
        documentIndex: 1
      - equal:
          path: spec.ports[0].nodePort
          value: 30481
        documentIndex: 1
  - it: should render nodePort for vminsert service
    set:
      vminsert:
        service:
          type: NodePort
          nodePort: 30480
    asserts:
      - equal:
          path: spec.type
          value: NodePort
        documentIndex: 0
      - equal:
          path: spec.ports[0].nodePort
          value: 30480
        documentIndex: 0
  - it: should render nodePort for vmstorage service
    set:
      vmstorage:
        service:
          type: NodePort
          nodePort: 30482
    asserts:
      - equal:
          path: spec.type
          value: NodePort
        documentIndex: 2
      - equal:
          path: spec.ports[0].nodePort
          value: 30482
        documentIndex: 2
