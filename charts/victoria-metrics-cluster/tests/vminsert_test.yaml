suite: vminsert templates test
chart:
  version: 0.1.1
  appVersion: 0.1.0
templates:
  - vminsert-server.yaml
tests:
  - it: deployment should match snapshot
    asserts:
      - matchSnapshot: {}
  - it: deployment should match snapshot with fullnameOverride, extraLabels and podLabels
    set:
      vminsert:
        name: insert
        fullnameOverride: vminsert-node
        extraLabels:
          extraLabelName: extraLabelValue
        podLabels:
          podLabelName: podLabelValue
    asserts:
      - matchSnapshot: {}
  - it: should render custom command
    set:
      vminsert:
        command:
          - /custom/bin/vminsert
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - /custom/bin/vminsert
  - it: should apply global.extraLabels to resource metadata and pod template
    set:
      global:
        extraLabels:
          team: platform
    asserts:
      - equal:
          path: metadata.labels.team
          value: platform
      - equal:
          path: spec.template.metadata.labels.team
          value: platform
  - it: should apply global.extraAnnotations to resource metadata and pod template
    set:
      global:
        extraAnnotations:
          owner: platform-team
    asserts:
      - equal:
          path: metadata.annotations.owner
          value: platform-team
      - equal:
          path: spec.template.metadata.annotations.owner
          value: platform-team
