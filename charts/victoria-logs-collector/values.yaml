# Default values for victoria-logs-collector.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Important helm-chart settings below, modify them with you own settings

# -- List of log destinations. Multiple destinations mean data should be replicated across multiple destinations
#
# If you specify a proxy address (such as vmauth, nginx, or similar) in front of VictoriaLogs, ensure that the `/insert/jsonline` and `/internal/insert` endpoints are correctly routed, as they may be required by the chart.
remoteWrite:
#  - url: http://victoria-logs:9428

resources:
#   limits:
#     cpu: 100m
#     memory: 128Mi
#   requests:
#     cpu: 100m
#     memory: 128Mi

# Advanced helm-chart configuration below, it is recommended to pass default parameters

# -- Override chart name
nameOverride: ""

# -- Override resources fullname
fullnameOverride: ""

global:
  # -- Image pull secrets, that can be shared across multiple helm charts
  imagePullSecrets: []
  image:
    # -- Image registry, that can be shared across multiple helm charts
    registry: ""
  # -- Openshift security context compatibility configuration
  compatibility:
    openshift:
      adaptSecurityContext: "auto"
  cluster:
    # -- K8s cluster domain suffix, uses for building storage pods' FQDN. Details are [here](https://kubernetes.io/docs/tasks/administer-cluster/dns-custom-nameservers/)
    dnsDomain: cluster.local.

# -- Service account is needed to enrich logs with pod metadata using Kubernetes API
serviceAccount:
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# -- Extra labels for Pods only
podLabels: {}

# -- Security context to be added to pod
podSecurityContext:
  enabled: true
  # fsGroup: 2000

# -- Security context to be added to pod's containers
securityContext:
  enabled: true
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# -- Annotations to be added to the deployment
annotations: {}

# -- Annotations to be added to pod
podAnnotations: {}

# -- Pod's node selector. Details are [here](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodeselector)
nodeSelector: {}

# -- Node tolerations for server scheduling to nodes with taints. Details are [here](https://kubernetes.io/docs/concepts/configuration/assign-pod-node/)
tolerations: []

# -- Pod topologySpreadConstraints
topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: topology.kubernetes.io/zone
#   whenUnsatisfiable: DoNotSchedule

# -- Pod affinity
affinity: {}

# -- Priority class to be assigned to the pod(s)
priorityClassName: "system-node-critical" # TODO: is it good default option for daemonsets that collects logs?

probe:
  # -- Readiness probe
  readiness:
    httpGet: {}
    initialDelaySeconds: 5
    periodSeconds: 15
  # -- Liveness probe
  liveness:
    tcpSocket: {}
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 5
  # -- Startup probe
  startup: {}
