apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "victoria-logs-collector.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "victoria-logs-collector.fullname" . }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "victoria-logs-collector.fullname" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "victoria-logs-collector.fullname" . }}
        {{- with .Values.podLabels }}
        {{ toYaml . | nindent 8 }}
        {{- end }}
      annotations: {{ toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      priorityClassName: {{ .Values.priorityClassName }}
      serviceAccountName: {{ include "victoria-logs-collector.fullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.podSecurityContext.enabled }}
      securityContext: {{ omit .Values.podSecurityContext "enabled" | toYaml | nindent 8 }}
      {{- end }}
      containers:
        - name: victoria-logs-collector
          image: {{ .Values.global.image.registry | default "docker.io" }}/timberio/vector:0.48.0-distroless-libc
          imagePullPolicy: IfNotPresent
          {{- if .Values.securityContext.enabled }}
          securityContext: {{ omit .Values.securityContext "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.resources }}
          resources:
            {{ toYaml .Values.resources | nindent 12 }}
          {{- end }}
          {{- if .Values.probe.readiness.httpGet }}
          readinessProbe:
            {{ toYaml .Values.probe.readiness | nindent 12 }}
          {{- end }}
          {{- if .Values.probe.liveness.tcpSocket }}
          livenessProbe:
            {{ toYaml .Values.probe.liveness | nindent 12 }}
          {{- end }}
          {{- if .Values.probe.startup.httpGet }}
          startupProbe:
            {{ toYaml .Values.probe.startup | nindent 12 }}
          {{- end }}
          env:
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/vector
              readOnly: true
            - name: vl-collector-data
              mountPath: /vl-collector
      volumes:
        - name: config
          configMap:
            name: {{ include "victoria-logs-collector.fullname" . }}-config
        - name: vl-collector-data
          hostPath:
            path: /var/lib/vl-collector
