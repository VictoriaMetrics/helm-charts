suite: service templates test
chart:
  version: 0.1.1
  appVersion: 0.1.0
templates:
  - service.yaml
tests:
  - it: service should match snapshot
    set:
      vmauth:
        enabled: true
        image:
          tag: v1.116.0
    asserts:
      - matchSnapshot: {}
  - it: service should match snapshot with fullnameOverride and extraLabels
    set:
      vminsert:
        name: insert
        fullnameOverride: vminsert-node
        extraLabels:
          extraLabelName: insertExtraLabelValue
        service:
          labels:
            extraServiceLabelName: insertExtraServiceLabelValue
      vmauth:
        enabled: true
        image:
          tag: v1.116.0
        name: auth
        fullnameOverride: vmauth-node
        extraLabels:
          extraLabelName: authExtraLabelValue
        service:
          labels:
            extraServiceLabelName: authExtraServiceLabelValue
      vmselect:
        name: select
        fullnameOverride: vmselect-node
        extraLabels:
          extraLabelName: selectExtraLabelValue
        service:
          labels:
            extraServiceLabelName: selectExtraServiceLabelValue
      vmstorage:
        name: storage
        fullnameOverride: vmstorage-node
        extraLabels:
          extraLabelName: storageExtraLabelValue
        service:
          labels:
            extraServiceLabelName: storageExtraServiceLabelValue
    asserts:
      - matchSnapshot: {}
  - it: should render nodePort for vlselect service
    set:
      vlselect:
        service:
          type: NodePort
          nodePort: 30471
    asserts:
      - equal:
          path: spec.type
          value: NodePort
        documentIndex: 0
      - equal:
          path: spec.ports[0].nodePort
          value: 30471
        documentIndex: 0
  - it: should render nodePort for vmauth service
    set:
      vmauth:
        enabled: true
        image:
          tag: v1.116.0
        service:
          type: NodePort
          nodePort: 30427
    asserts:
      - equal:
          path: spec.type
          value: NodePort
        documentIndex: 1
      - equal:
          path: spec.ports[0].nodePort
          value: 30427
        documentIndex: 1
