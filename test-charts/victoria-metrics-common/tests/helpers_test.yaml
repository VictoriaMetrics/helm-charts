suite: helpers templates
templates:
  - helpers.yaml
tests:
  - it: with global fullnameOverride
    set:
      fullnameOverride: test
    asserts:
      - equal:
          path: vm.fullname
          value: test
      - equal:
          path: vm.plain.fullname
          value: test
      - equal:
          path: vm.managed.fullname
          value: test
      - equal:
          path: vm.cr.fullname
          value: test
      - equal:
          path: vm.namespace
          value: NAMESPACE
  - it: with global extraLabels
    set:
      global:
        extraLabels:
          globalName: globalValue
    asserts:
      - equal:
          path: vm.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: vm.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - equal:
          path: vm.labels["app.kubernetes.io/name"]
          value: victoria-metrics-common
      - equal:
          path: vm.labels.globalName
          value: globalValue
      - matchRegex:
          path: vm.labels["helm.sh/chart"]
          pattern: ^victoria-metrics-common-
  - it: with appKey only
    set:
      ctx:
        appKey: test
      test:
        name: ""
    asserts:
      - equal:
          path: vm.fullname
          value: RELEASE-NAME-victoria-metrics-common
      - equal:
          path: vm.plain.fullname
          value: RELEASE-NAME-victoria-metrics-common-test
      - equal:
          path: vm.managed.fullname
          value: vmtest-RELEASE-NAME-victoria-metrics-common
      - equal:
          path: vm.cr.fullname
          value: RELEASE-NAME-victoria-metrics-common
      - equal:
          path: vm.namespace
          value: NAMESPACE
  - it: with appKey and name set
    set:
      ctx:
        appKey: app
      app:
        name: test
    asserts:
      - equal:
          path: vm.fullname
          value: RELEASE-NAME-victoria-metrics-common
      - equal:
          path: vm.plain.fullname
          value: RELEASE-NAME-victoria-metrics-common-app
      - equal:
          path: vm.managed.fullname
          value: vmapp-test
      - equal:
          path: vm.cr.fullname
          value: test
      - equal:
          path: vm.namespace
          value: NAMESPACE
  - it: with appKey and fullnameOverride set
    set:
      ctx:
        appKey: app
      app:
        fullnameOverride: test
    asserts:
      - equal:
          path: vm.fullname
          value: RELEASE-NAME-victoria-metrics-common
      - equal:
          path: vm.plain.fullname
          value: test
      - equal:
          path: vm.managed.fullname
          value: vmapp-RELEASE-NAME-victoria-metrics-common
      - equal:
          path: vm.cr.fullname
          value: RELEASE-NAME-victoria-metrics-common
      - equal:
          path: vm.namespace
          value: NAMESPACE
  - it: with appKey and toplevel fullnameOverride set
    set:  
      ctx:
        appKey: app
      fullnameOverride: global
      app:
        fullnameOverride: ""
    asserts:
      - equal:
          path: vm.fullname
          value: global
      - equal:
          path: vm.plain.fullname
          value: global-app
      - equal:
          path: vm.managed.fullname
          value: vmapp-global
      - equal:
          path: vm.cr.fullname
          value: global
      - equal:
          path: vm.namespace
          value: NAMESPACE
  - it: with appKey and both top level and nested fullnameOverride set
    set:
      ctx:
        appKey:
         - test
         - single
      fullnameOverride: global
      test:
        single:
          fullnameOverride: override
    asserts:
      - equal:
          path: vm.fullname
          value: global
      - equal:
          path: vm.plain.fullname
          value: override
      - equal:
          path: vm.managed.fullname
          value: vmsingle-global
      - equal:
          path: vm.cr.fullname
          value: global
      - equal:
          path: vm.namespace
          value: NAMESPACE
  - it: with appKey and both top level and nested name set
    set:
      ctx:
        appKey:
         - test
         - single
      fullnameOverride: global
      test:
        single:
          name: override
    asserts:
      - equal:
          path: vm.fullname
          value: global
      - equal:
          path: vm.plain.fullname
          value: global-single
      - equal:
          path: vm.managed.fullname
          value: vmsingle-override
      - equal:
          path: vm.cr.fullname
          value: override
      - equal:
          path: vm.namespace
          value: NAMESPACE
  - it: with appKey in ctx and values
    set:
      ctx:
        appKey:
         - test
         - single
        test:
          single:
            name: override-1
      test:
        single:
          name: override-2
      fullnameOverride: global
    asserts:
      - equal:
          path: vm.fullname
          value: global
      - equal:
          path: vm.plain.fullname
          value: global-single
      - equal:
          path: vm.managed.fullname
          value: vmsingle-override-2
      - equal:
          path: vm.cr.fullname
          value: override-2
      - equal:
          path: vm.namespace
          value: NAMESPACE
  - it: with appKey but no data for a key
    set:
      ctx:
        appKey:
         - test
         - single
         - absent
        test:
          single:
            name: override-1
      test:
        single:
          name: override-2
      fullnameOverride: global
    asserts:
      - failedTemplate:
          errorMessage: No data for appKey test->single->absent
  - it: with appKey in ctx with spec
    set:
      ctx:
        appKey:
         - test
         - single
         - spec
        test:
          single:
            name: override-1
            spec:
              value: {}
      test:
        single:
          name: override-2
      fullnameOverride: global
    asserts:
      - equal:
          path: vm.fullname
          value: global
      - equal:
          path: vm.plain.fullname
          value: global-single
      - equal:
          path: vm.managed.fullname
          value: vmsingle-override-2
      - equal:
          path: vm.cr.fullname
          value: override-2
      - equal:
          path: vm.namespace
          value: NAMESPACE

  # useLegacyNaming tests
  - it: useLegacyNaming false without appKey uses chart-derived kind
    set:
      useLegacyNaming: false
    asserts:
      - equal:
          path: vm.plain.fullname
          value: vmcommon-RELEASE-NAME

  - it: useLegacyNaming false with non-operator appKey uses chart-derived kind
    set:
      useLegacyNaming: false
      ctx:
        appKey: server
      server:
        name: ""
    asserts:
      - equal:
          path: vm.plain.fullname
          value: vmcommon-RELEASE-NAME

  - it: useLegacyNaming false with vminsert appKey uses component as kind
    set:
      useLegacyNaming: false
      ctx:
        appKey: vminsert
      vminsert:
        name: ""
    asserts:
      - equal:
          path: vm.plain.fullname
          value: vminsert-RELEASE-NAME

  - it: useLegacyNaming false with vlselect appKey uses component as kind
    set:
      useLegacyNaming: false
      ctx:
        appKey: vlselect
      vlselect:
        name: ""
    asserts:
      - equal:
          path: vm.plain.fullname
          value: vlselect-RELEASE-NAME

  - it: useLegacyNaming false with vtstorage appKey uses component as kind
    set:
      useLegacyNaming: false
      ctx:
        appKey: vtstorage
      vtstorage:
        name: ""
    asserts:
      - equal:
          path: vm.plain.fullname
          value: vtstorage-RELEASE-NAME

  - it: useLegacyNaming false with named sub-component prefixes with chart kind
    set:
      useLegacyNaming: false
      ctx:
        appKey: alertmanager
      alertmanager:
        name: ""
    asserts:
      - equal:
          path: vm.plain.fullname
          value: vmalertmanager-RELEASE-NAME

  - it: useLegacyNaming true preserves legacy naming
    set:
      useLegacyNaming: true
      ctx:
        appKey: server
      server:
        name: ""
    asserts:
      - equal:
          path: vm.plain.fullname
          value: RELEASE-NAME-victoria-metrics-common-server

  # vm.managed.fullname useLegacyNaming tests
  - it: managed.fullname useLegacyNaming true with operator-prefix appKey uses suffix style
    set:
      useLegacyNaming: true
      ctx:
        appKey: vminsert
      vminsert:
        name: ""
    asserts:
      - equal:
          path: vm.managed.fullname
          value: RELEASE-NAME-victoria-metrics-common-vminsert

  - it: managed.fullname useLegacyNaming true with vl-prefix appKey uses suffix style
    set:
      useLegacyNaming: true
      ctx:
        appKey: vlselect
      vlselect:
        name: ""
    asserts:
      - equal:
          path: vm.managed.fullname
          value: RELEASE-NAME-victoria-metrics-common-vlselect

  - it: managed.fullname useLegacyNaming true with non-operator appKey prefixes and uses suffix style
    set:
      useLegacyNaming: true
      ctx:
        appKey: alertmanager
      alertmanager:
        name: ""
    asserts:
      - equal:
          path: vm.managed.fullname
          value: RELEASE-NAME-victoria-metrics-common-vmalertmanager

  - it: managed.fullname useLegacyNaming false with vminsert appKey uses prefix style
    set:
      useLegacyNaming: false
      ctx:
        appKey: vminsert
      vminsert:
        name: ""
    asserts:
      - equal:
          path: vm.managed.fullname
          value: vminsert-RELEASE-NAME-victoria-metrics-common

  - it: managed.fullname no useLegacyNaming set uses prefix style (default)
    set:
      ctx:
        appKey: vminsert
      vminsert:
        name: ""
    asserts:
      - equal:
          path: vm.managed.fullname
          value: vminsert-RELEASE-NAME-victoria-metrics-common
