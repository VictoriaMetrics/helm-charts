suite: service templates
templates:
  - service.yaml
tests:
  - it: with no style define
    set:
      ctx:
        appKey: test
    asserts:
      - failedTemplate:
          errorMessage: .style argument should be either `plain` or `managed`
  - it: with appKey and plain style
    set:
      ctx:
        appKey: test
        style: plain
      test:
        name: ""
    asserts:
      - equal:
          path: vm.url
          value: http://RELEASE-NAME-victoria-metrics-common-test.NAMESPACE.svc:80
      - equal:
          path: vm.fqdn
          value: RELEASE-NAME-victoria-metrics-common-test.NAMESPACE.svc
  - it: with appKey and managed style
    set:
      ctx:
        appKey: test
        style: managed
      test:
        name: ""
    asserts:
      - equal:
          path: vm.url
          value: http://vmtest-RELEASE-NAME-victoria-metrics-common.NAMESPACE.svc:80
      - equal:
          path: vm.fqdn
          value: vmtest-RELEASE-NAME-victoria-metrics-common.NAMESPACE.svc
  - it: with appKey, nested name and managed style
    set:
      ctx:
        appKey:
          - managed
          - vmsingle
        style: managed
      managed:
        vmsingle:
          name: test
    asserts:
      - equal:
          path: vm.url
          value: http://vmsingle-test.NAMESPACE.svc:80
      - equal:
          path: vm.fqdn
          value: vmsingle-test.NAMESPACE.svc
  - it: with appKey, nested name and plain style
    set:
      ctx:
        appKey:
          - managed
          - server
        style: plain
      managed:
        server:
          name: test
    asserts:
      - equal:
          path: vm.fqdn
          value: RELEASE-NAME-victoria-metrics-common-server.NAMESPACE.svc
  - it: with appKey, nested fullnameOverride and plain style
    set:
      ctx:
        appKey:
          - managed
          - server
        style: plain
      managed:
        server:
          fullnameOverride: test
    asserts:
      - equal:
          path: vm.fqdn
          value: test.NAMESPACE.svc
  - it: with appKey, nested name and managed style with port
    set:
      ctx:
        appKey: 
          - managed
          - server
          - spec
        style: managed
        managed:
          server:
            name: test
            spec:
              port: 4321
    asserts:
      - equal:
          path: vm.url
          value: http://vmserver-test.NAMESPACE.svc:4321
  - it: with list of http addresses
    set:
      ctx:
        style: plain
        appKey: server
      server:
        http:
          - name: test
            value: :9090
          - name: primary
            value: :9191
            primary: true
    asserts:
      - equal:
          path: vm.url
          value: http://RELEASE-NAME-victoria-metrics-common-server.NAMESPACE.svc:9191
  - it: with primary http item tls uses https scheme and port
    set:
      ctx:
        style: plain
        appKey: server
      server:
        http:
          - name: https
            value: :8443
            primary: true
            tls: true
    asserts:
      - equal:
          path: vm.url
          value: https://RELEASE-NAME-victoria-metrics-common-server.NAMESPACE.svc:8443
  - it: with http section and no tls falls back to extraArgs.tls
    set:
      ctx:
        style: plain
        appKey: server
      server:
        http:
          - name: http
            value: :8429
            primary: true
        extraArgs:
          tls: "true"
    asserts:
      - equal:
          path: vm.url
          value: https://RELEASE-NAME-victoria-metrics-common-server.NAMESPACE.svc:8429
  - it: with no http section falls back to extraArgs.tls for https scheme
    set:
      ctx:
        style: plain
        appKey: server
      server:
        extraArgs:
          tls: "true"
    asserts:
      - equal:
          path: vm.url
          value: https://RELEASE-NAME-victoria-metrics-common-server.NAMESPACE.svc:443
  - it: with httpListenAddr set http item tls is ignored without extraArgs.tls
    set:
      ctx:
        style: plain
        appKey: server
      server:
        http:
          - name: https
            value: :8443
            primary: true
            tls: true
        extraArgs:
          httpListenAddr: :9000
    asserts:
      - equal:
          path: vm.url
          value: http://RELEASE-NAME-victoria-metrics-common-server.NAMESPACE.svc:8443
  - it: with httpListenAddr and extraArgs.tls both set uses https
    set:
      ctx:
        style: plain
        appKey: server
      server:
        http:
          - name: http
            value: :8429
            primary: true
        extraArgs:
          httpListenAddr: :9000
          tls: "true"
    asserts:
      - equal:
          path: vm.url
          value: https://RELEASE-NAME-victoria-metrics-common-server.NAMESPACE.svc:8429
